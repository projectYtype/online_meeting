        proposeNewTime: "새로운 시간을 제안해주세요.",

        buyerTag: "해외 바이어",

      },
      en: {
        signInTitle: "Sign in to your dashboard",
        domestic: "Domestic Company",
        buyer: "Overseas Buyer",
        userId: "User ID",
        password: "Password",
        idPlaceholder: "Enter your ID",

        website: "Website",
        requestMeeting: "Request Meeting",
        receivedRequests: "Received Requests",
        receivedDesc: "List of meeting proposals received by me.",
        sentRequests: "Sent Requests",
        sentDesc: "History of meeting requests sent by me.",
        thRequester: "Requester",
        thRecipient: "Recipient",

        thStatus: "Status",
        thAction: "Action",

        noSentRequests: "No sent requests.",
        accept: "Accept",
        reschedule: "Reschedule",
        decline: "Decline",
        waitingLink: "Waiting for link",

        profileDesc: "Set up the basic information to be shown to the other party.",
        companyName: "Company Name",
        countryRegion: "Country / Region",
        contactPerson: "Contact Person (Title)",

        productsInterests: "Products / Interests",
        websiteUrl: "Website URL",
        saveChanges: "Save Changes",
        saving: "Saving...",
        with: "with",
        selectTime: "Select Time",
        chooseSlot: "Choose a time slot",
        messageOptional: "Message (Optional)",
        addBriefNote: "Add a brief note...",
        cancel: "Cancel",
        close: "Close",
        sendRequest: "Send Request",
        sending: "Sending...",
        acceptRequest: "Accept Request",
        acceptModalDesc: "Would you like to approve this meeting? A video conference link will be issued upon approval.",
        proposeNewTime: "Please propose a new time.",
        proposedTime: "Proposed Time",
        noteToSender: "Note to Sender",
        declineRequest: "Decline Request",
        declineModalDesc: "Please leave a brief reason for declining.",
        reasonOptional: "Reason (Optional)",
        typeBriefReason: "Type a brief reason...",
        confirm: "Confirm",
        alertLoginInput: "Please enter your ID and password.",
        alertWrongPw: "Password does not match.",
        alertNoData: "No registered information found. Please contact the administrator.",
        alertSaved: "Profile saved successfully.",
        alertSaveError: "An error occurred while saving.",
        alertDuplicateTime: "You already have a schedule at this time.",
        alertError: "An error occurred!",
        companyTag: "Company",
        buyerTag: "Buyer",
        unnamedEvent: "Current Event"
      }
    };

    const parseTimeSlots = (slots) => {
      if (Array.isArray(slots)) return slots;
      if (typeof slots === 'string') {
        return slots.split(',').map(s => s.trim()).filter(Boolean);
      }
      return ["09:00~10:00", "10:00~11:00", "13:00~14:00", "14:00~15:00"]; 
    };

    function App() {
      const [lang, setLang] = useState(() => localStorage.getItem('b2b_meeting_lang') || 'ko');
      const [user, setUser] = useState(() => {
        const saved = localStorage.getItem('b2b_meeting_user');
        return saved ? JSON.parse(saved) : null;
      });
      
      const [activeTab, setActiveTab] = useState('schedule');
      const [profiles, setProfiles] = useState([]);
      const [meetings, setMeetings] = useState([]);
      const [eventInfo, setEventInfo] = useState(() => {
        const saved = localStorage.getItem('b2b_event_info');
        return saved ? JSON.parse(saved) : { name: '', timeSlots: [] };
      });
      const [loading, setLoading] = useState(false);

      const [applyModal, setApplyModal] = useState({ isOpen: false, targetId: '', targetName: '' });
      const [replyModal, setReplyModal] = useState({ isOpen: false, meetingId: '', type: '' });
      const [detailModal, setDetailModal] = useState({ isOpen: false, profile: null });
      const [msgModal, setMsgModal] = useState({ isOpen: false, text: '' });
      
      const [loginForm, setLoginForm] = useState({ id: '', pw: '', type: 'company' });
      const [myProfile, setMyProfile] = useState({ name: '', country: '', manager: '', intro: '', products: '', website: '' });
      
      const handleLangChange = (newLang) => {
        setLang(newLang);
        localStorage.setItem('b2b_meeting_lang', newLang);
      };
      
      const t = DICTIONARY[lang];

      const fetchData = async () => {
        try {
          const res = await fetch(ONLINE_GAS_URL);
          const data = await res.json();
          setProfiles(data.profiles || []);
          setMeetings(data.meetings || []);
          
          if (user) {
            const me = (data.profiles || []).find(p => p.userId === user.id && p.userType === user.type);
            if (me) {
              setMyProfile(me.profileData);
              const userEventName = me.eventName || me.profileData?.eventName || t.unnamedEvent;
              const userTimeSlots = parseTimeSlots(me.timeSlots || me.profileData?.timeSlots);
              
              const newEventInfo = { name: userEventName, timeSlots: userTimeSlots };
              setEventInfo(newEventInfo);
              localStorage.setItem('b2b_event_info', JSON.stringify(newEventInfo));
            }
          }
        } catch (error) {
          console.error("Data load failed:", error);
        }
      };

      useEffect(() => { fetchData(); }, [user]);
      
      const handleLogin = (e) => {
        e.preventDefault();
        if(!loginForm.id || !loginForm.pw) return alert(t.alertLoginInput);
        
        const existingProfile = profiles.find(p => p.userId === loginForm.id && p.userType === loginForm.type);
        
        if (existingProfile) {
          if (existingProfile.profileData.password !== loginForm.pw) {
            return alert(t.alertWrongPw);
          }
          
          const userEventName = existingProfile.eventName || existingProfile.profileData?.eventName || t.unnamedEvent;
          const userTimeSlots = parseTimeSlots(existingProfile.timeSlots || existingProfile.profileData?.timeSlots);
          
          const newEventInfo = { name: userEventName, timeSlots: userTimeSlots };
          setEventInfo(newEventInfo);
          localStorage.setItem('b2b_event_info', JSON.stringify(newEventInfo));
          
          const loggedInUser = { id: loginForm.id, type: loginForm.type };
          setMyProfile(existingProfile.profileData);
          setUser(loggedInUser);
          localStorage.setItem('b2b_meeting_user', JSON.stringify(loggedInUser));
        } else {
          alert(t.alertNoData);
        }
      };
      
      const handleLogout = () => {
        localStorage.removeItem('b2b_meeting_user');
        localStorage.removeItem('b2b_event_info');
        setUser(null);
        setLoginForm({ ...loginForm, id: '', pw: '' });
        setEventInfo({ name: '', timeSlots: [] });
      };
      
      const saveProfile = async () => {
        setLoading(true);
        try {
          await fetch(ONLINE_GAS_URL, {
            method: 'POST',
            body: JSON.stringify({
              action: 'save_profile',
              data: { userId: user.id, userType: user.type, profileData: myProfile }
            })
          });
          alert(t.alertSaved);
          fetchData();
        } catch (e) {
          alert(t.alertSaveError);
        }
        setLoading(false);
      };
      
      const handleApplyMeeting = async (e) => {
        e.preventDefault();
        const time = e.target.time.value;
        const rawMsg = e.target.message.value;

        const isDuplicate = meetings.some(m => 
          (m.requesterId === user.id || m.receiverId === user.id) && m.sessionTime === time && m.status !== '일정상 진행 불가'
        );
        if (isDuplicate) return alert(t.alertDuplicateTime);

        // ✨ 메시지 누적을 위한 포맷팅 (초기 메시지)
        let initialMsg = '';
        if (rawMsg) {
          const timeString = new Date().toLocaleString('ko-KR', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
          initialMsg = `[${timeString} - ${user.id}]\n${rawMsg}`;
        }

        setLoading(true);
        try {
          await fetch(ONLINE_GAS_URL, {
            method: 'POST',
            body: JSON.stringify({
              action: 'request_meeting',
              data: {
                id: `mtg_${Date.now()}`, requesterId: user.id, receiverId: applyModal.targetId,
                sessionTime: time, message: initialMsg
              }
            })
          });
          setApplyModal({ isOpen: false });
          fetchData();
          setActiveTab('schedule');
        } catch (err) { alert(t.alertError); }
        setLoading(false);
      };

      const handleReplyMeeting = async (e) => {
        e.preventDefault();
        const { meetingId, type } = replyModal;
        let status = '';
        let newText = '';
        
        if (type === 'approve') status = '승인 완료';
        if (type === 'reschedule') {
          status = '일정 조정 요청';
          newText = `[희망시간: ${e.target.newTime.value}] ` + e.target.replyMessage.value;
        }
        if (type === 'reject') {
          status = '일정상 진행 불가';
          newText = e.target.replyMessage?.value || '';
        }

        // ✨ 기존 메시지 가져와서 새로운 메시지 이어붙이기
        const currentMeeting = meetings.find(m => m.id === meetingId);
        const oldMsg = currentMeeting?.message || '';
        let finalMsg = oldMsg;

        if (newText) {
          const timeString = new Date().toLocaleString('ko-KR', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
          const logEntry = `[${timeString} - ${user.id}]\n${newText}`;
          // 기존 메시지가 있으면 줄바꿈 2번 후 추가, 없으면 새 메시지만
          finalMsg = oldMsg ? `${oldMsg}\n\n${logEntry}` : logEntry;
        }

        setLoading(true);
        try {
          await fetch(ONLINE_GAS_URL, {
            method: 'POST',
            body: JSON.stringify({
              action: 'update_meeting',
              data: { id: meetingId, status, message: finalMsg }
            })
          });
          setReplyModal({ isOpen: false });
          fetchData();
        } catch (err) { alert(t.alertError); }
        setLoading(false);
      };

      // ✨ 지금이 내 턴인지 확인하는 함수 (마지막 발송자 체크)
      const checkIsMyTurn = (m) => {
        if (m.status === '검토 중') return m.receiverId === user.id;
        if (m.status === '일정 조정 요청') {
          if (!m.message) return m.receiverId === user.id;
          
          const matches = m.message.match(/\[.*? - (.*?)\]/g);
          if (matches && matches.length > 0) {
            const lastMatch = matches[matches.length - 1];
            const lastSender = lastMatch.replace(/\[.*? - (.*?)\]/, '$1');
            return lastSender !== user.id; // 마지막 발송자가 내가 아니면 내 턴
          }
          return m.receiverId === user.id;
        }
        return false;
      };
      
      const getStatusBadge = (status) => {
        let label = status;
        let style = "bg-gray-100 text-gray-800 border border-gray-200"; 

        if (status === '승인 완료') {
          label = lang === 'ko' ? '승인 완료' : 'Approved';
          style = "bg-blue-50 text-blue-600 border border-blue-100";
        } else if (status === '검토 중') {
          label = lang === 'ko' ? '검토 중' : 'Pending';
          style = "bg-gray-100 text-gray-600 border border-gray-200";
        } else if (status === '일정상 진행 불가') {
          label = lang === 'ko' ? '거절됨' : 'Declined';
          style = "bg-red-50 text-red-600 border border-red-100";
        } else if (status === '일정 조정 요청') {
          label = lang === 'ko' ? '조정 요청' : 'Reschedule';
          style = "bg-orange-50 text-orange-600 border border-orange-100";
        }

        return <span className={`inline-flex items-center px-2 py-1 rounded-md text-[11px] font-bold tracking-wide uppercase ${style}`}>{label}</span>;
      };

      const LanguageToggle = () => (
        <div className="inline-flex bg-gray-100 p-0.5 rounded-lg text-[11px] font-bold tracking-wide">
          <button type="button" onClick={() => handleLangChange('ko')} className={`px-2.5 py-1 rounded-md transition-all ${lang === 'ko' ? 'bg-white text-gray-900 shadow-sm' : 'text-gray-400 hover:text-gray-600'}`}>KO</button>
          <button type="button" onClick={() => handleLangChange('en')} className={`px-2.5 py-1 rounded-md transition-all ${lang === 'en' ? 'bg-white text-gray-900 shadow-sm' : 'text-gray-400 hover:text-gray-600'}`}>EN</button>
        </div>
      );
      
      if (!user) {
        return (
          <div className="min-h-screen flex flex-col items-center justify-center p-4 relative">
            <div className="absolute top-6 right-6">
              <LanguageToggle />
            </div>
            <div className="w-full max-w-sm fade-in">
              <div className="text-center mb-10">
                <div className="w-12 h-12 bg-gray-900 text-white rounded-2xl flex items-center justify-center text-xl font-bold mx-auto mb-6 shadow-xl">B.</div>
                <h1 className="text-2xl font-semibold tracking-tight text-gray-900 mb-2">B2B Connect</h1>
                <p className="text-sm text-gray-500">{t.signInTitle}</p>
              </div>
              <div className="bg-white p-8 rounded-3xl border border-gray-200/60 shadow-[0_8px_30px_rgb(0,0,0,0.04)]">
                <form onSubmit={handleLogin} className="space-y-6">
                  <div className="flex bg-gray-50 p-1 rounded-xl">
                    <label className={`flex-1 text-center py-2.5 rounded-lg cursor-pointer text-[13px] font-semibold transition-all ${loginForm.type === 'company' ? 'bg-white shadow-sm text-gray-900' : 'text-gray-400 hover:text-gray-600'}`}>
                      <input type="radio" className="hidden" checked={loginForm.type === 'company'} onChange={()=>setLoginForm({...loginForm, type: 'company'})} />
                      {t.domestic}
                    </label>
                    <label className={`flex-1 text-center py-2.5 rounded-lg cursor-pointer text-[13px] font-semibold transition-all ${loginForm.type === 'buyer' ? 'bg-white shadow-sm text-gray-900' : 'text-gray-400 hover:text-gray-600'}`}>
                      <input type="radio" className="hidden" checked={loginForm.type === 'buyer'} onChange={()=>setLoginForm({...loginForm, type: 'buyer'})} />
                      {t.buyer}
                    </label>
                  </div>
                  <div className="space-y-4">
                    <div>
                      <label className="block text-[11px] font-bold text-gray-500 uppercase tracking-wider mb-2">{t.userId}</label>
                      <input type="text" value={loginForm.id} onChange={e=>setLoginForm({...loginForm, id:e.target.value})} className="w-full px-4 py-3 bg-gray-50/50 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-gray-900/10 focus:border-gray-900 transition-all placeholder-gray-400" placeholder={t.idPlaceholder} />
                    </div>
                    <div>
                      <label className="block text-[11px] font-bold text-gray-500 uppercase tracking-wider mb-2">{t.password}</label>
                      <input type="password" value={loginForm.pw} onChange={e=>setLoginForm({...loginForm, pw:e.target.value})} className="w-full px-4 py-3 bg-gray-50/50 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-gray-900/10 focus:border-gray-900 transition-all placeholder-gray-400" placeholder={t.pwPlaceholder} />
                    </div>
                  </div>
                  <button type="submit" className="w-full bg-gray-900 text-white font-medium text-sm py-3.5 rounded-xl hover:bg-black hover:shadow-lg hover:-translate-y-0.5 transition-all duration-200">
                    {t.continue} &rarr;
                  </button>
                </form>
              </div>
            </div>
          </div>
        );
      }

      const partnerType = user.type === 'company' ? 'buyer' : 'company';
      const partners = profiles.filter(p => {
        if (p.userType !== partnerType) return false;
        const pEventName = p.eventName || p.profileData?.eventName || t.unnamedEvent;
        return pEventName === eventInfo.name;
      });
      const mySentMeetings = meetings.filter(m => m.requesterId === user.id);
      const myReceivedMeetings = meetings.filter(m => m.receiverId === user.id);
      
      return (
        <div className="max-w-6xl mx-auto p-6 sm:p-10 pb-32 fade-in">
          <header className="flex justify-between items-center py-4 border-b border-gray-200 mb-10">
            <div className="flex items-center gap-3">
              <div className="w-9 h-9 bg-gray-900 text-white rounded-xl flex items-center justify-center text-sm font-bold shadow-sm">B.</div>
              <div>
                <h1 className="text-lg font-bold tracking-tight text-gray-900 leading-none mb-1">
                  {eventInfo.name}
                </h1>
                <p className="text-[11px] font-medium text-gray-500 uppercase tracking-wider">
                  {t.workspace}
                </p>
              </div>
            </div>
            
            <div className="flex items-center gap-5">
              <div className="text-right hidden sm:block">
                <p className="text-[11px] font-bold text-gray-400 uppercase tracking-wider">{user.type === 'company' ? t.companyTag : t.buyerTag}</p>

                    <div>
                      <label className="block text-[12px] font-bold text-gray-500 uppercase tracking-wider mb-2">{t.noteToSender}</label>
                      <input type="text" name="replyMessage" required placeholder={lang === 'ko' ? "예시: 이 시간은 어떠신가요?" : "Ex: Are you available at this time?"} className="w-full px-4 py-3 bg-gray-50/50 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-gray-900/10 focus:border-gray-900 transition-all" />
                    </div>
                  </div>
                )}
                {replyModal.type === 'reject' && (
                  <div className="mb-8">
                    <label className="block text-[12px] font-bold text-gray-500 uppercase tracking-wider mb-2">{t.reasonOptional}</label>
                    <input type="text" name="replyMessage" placeholder={t.typeBriefReason} className="w-full px-4 py-3 bg-gray-50/50 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-gray-900/10 focus:border-gray-900 transition-all" />
                  </div>
                )}
                <div className="flex gap-3 justify-end">
                  <button type="button" onClick={() => setReplyModal({isOpen:false})} className="px-5 py-2.5 rounded-xl text-sm font-medium text-gray-500 hover:bg-gray-100 transition-colors">{t.cancel}</button>
                  <button type="submit" disabled={loading} className={`px-6 py-2.5 text-white rounded-xl text-sm font-medium transition-colors ${
                    replyModal.type === 'approve' ? 'bg-blue-600 hover:bg-blue-700' :
                    replyModal.type === 'reschedule' ? 'bg-gray-800 hover:bg-gray-900' :
                    'bg-red-600 hover:bg-red-700'
                  }`}>{t.confirm}</button>
                </div>
              </form>
            </div>
          )}

          {/* 메시지 전체 보기 모달 */}
          {msgModal.isOpen && (
            <div 
              className="fixed inset-0 z-[70] flex items-center justify-center p-4 bg-gray-900/40 backdrop-blur-sm fade-in"
              onClick={() => setMsgModal({ isOpen: false, text: '' })}
            >
              <div 
                className="bg-white rounded-3xl p-8 w-full max-w-md shadow-2xl border border-gray-100 relative"
                onClick={(e) => e.stopPropagation()}
              >
                <div className="flex justify-between items-center mb-4 border-b border-gray-100 pb-4">
                  <h3 className="font-bold text-lg text-gray-900">메시지 상세 내용</h3>
                  <button 
                    onClick={() => setMsgModal({ isOpen: false, text: '' })}
                    className="text-gray-400 hover:text-gray-900 transition-colors"
                  >
                    <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M6 18L18 6M6 6l12 12"></path>
                    </svg>
                  </button>
                </div>
                
                <p className="text-sm text-gray-700 leading-relaxed whitespace-pre-wrap bg-gray-50 p-5 rounded-2xl border border-gray-100 min-h-[100px] max-h-[60vh] overflow-y-auto">
                  {msgModal.text}
                </p>
                
                <div className="mt-6 flex justify-end">
                  <button 
                    onClick={() => setMsgModal({ isOpen: false, text: '' })} 
                    className="px-6 py-2.5 bg-gray-900 text-white rounded-xl text-sm font-medium hover:bg-black transition-colors"
                  >
                    닫기
                  </button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
