<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>B2B 온라인 미팅 참가자 라운지</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>
  
  <style>
    .custom-scrollbar::-webkit-scrollbar { height: 8px; width: 8px; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
  </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">
  <div id="root"></div>

  <script type="text/babel" data-presets="react">
    const { useState, useEffect } = React;

    // 🌟 여기에 2단계에서 만든 구글 Apps Script 웹 앱 URL을 넣으세요!
    const ONLINE_GAS_URL = 'https://script.google.com/macros/s/AKfycbzQH8Gwwv28mQRUlZq4NCKVDlv51EbtNCSOBp8xVnrQKXmvzDX_OzDz2x_QHrXFkAWY/exec';

    // 임시 세션 시간표 (관리자 설정에 맞춰 수정 가능)
    const TIME_SLOTS = [
      "09:00~09:30", "09:30~10:00", "10:00~10:30", "10:30~11:00", 
      "13:00~13:30", "13:30~14:00", "14:00~14:30", "14:30~15:00"
    ];

    function App() {
      const [user, setUser] = useState(null);
      const [activeTab, setActiveTab] = useState('partners'); // partners, schedule, profile
      
      const [profiles, setProfiles] = useState([]);
      const [meetings, setMeetings] = useState([]);
      const [loading, setLoading] = useState(false);

      // 모달 상태
      const [applyModal, setApplyModal] = useState({ isOpen: false, targetId: '', targetName: '' });
      const [replyModal, setReplyModal] = useState({ isOpen: false, meetingId: '', type: '' });

      // 로그인/프로필 폼
      const [loginForm, setLoginForm] = useState({ id: '', pw: '', type: 'company' });
      const [myProfile, setMyProfile] = useState({ name: '', country: '', manager: '', intro: '', products: '', website: '' });

      // --- 데이터 불러오기 ---
      const fetchData = async () => {
        try {
          const res = await fetch(ONLINE_GAS_URL);
          const data = await res.json();
          setProfiles(data.profiles || []);
          setMeetings(data.meetings || []);
        } catch (error) {
          console.error("데이터 로드 실패:", error);
        }
      };

      useEffect(() => { fetchData(); }, []);

// --- 로그인 (비밀번호 검증 강화) ---
      const handleLogin = (e) => {
        e.preventDefault();
        if(!loginForm.id || !loginForm.pw) return alert('아이디와 비밀번호를 입력해주세요.');
        
        // 구글 시트 프로필 풀에서 관리자가 발급해준 ID가 있는지 찾기
        const existingProfile = profiles.find(p => p.userId === loginForm.id && p.userType === loginForm.type);
        
        if (existingProfile) {
          // 🚨 관리자가 모달에서 할당해준 패스워드와 사용자가 입력한 비밀번호 엄격 대조 검증
          if (existingProfile.profileData.password !== loginForm.pw) {
            return alert('비밀번호가 일치하지 않습니다. 다시 입력해 주세요.');
          }
          setMyProfile(existingProfile.profileData);
          setUser({ id: loginForm.id, type: loginForm.type });
        } else {
          alert('등록되지 않은 온라인 계정이거나 권한 분류(국내기업/해외바이어) 선택이 잘못되었습니다. 관리자에게 문의하세요.');
        }
      };

      // --- 프로필 저장 ---
      const saveProfile = async () => {
        setLoading(true);
        try {
          await fetch(ONLINE_GAS_URL, {
            method: 'POST',
            body: JSON.stringify({
              action: 'save_profile',
              data: { userId: user.id, userType: user.type, profileData: myProfile }
            })
          });
          alert('프로필이 저장되었습니다.');
          fetchData();
        } catch (e) {
          alert('저장 중 오류가 발생했습니다.');
        }
        setLoading(false);
      };

      // --- 미팅 신청 ---
      const handleApplyMeeting = async (e) => {
        e.preventDefault();
        const time = e.target.time.value;
        const msg = e.target.message.value;

        // 중복 신청 체크
        const isDuplicate = meetings.some(m => 
          (m.requesterId === user.id || m.receiverId === user.id) && m.sessionTime === time && m.status !== '일정상 진행 불가'
        );
        if (isDuplicate) return alert('해당 시간에는 이미 다른 미팅이 예정되어 있거나 신청 대기 중입니다.');

        setLoading(true);
        try {
          await fetch(ONLINE_GAS_URL, {
            method: 'POST',
            body: JSON.stringify({
              action: 'request_meeting',
              data: {
                id: `mtg_${Date.now()}`, requesterId: user.id, receiverId: applyModal.targetId,
                sessionTime: time, message: msg
              }
            })
          });
          alert('미팅이 신청되었습니다.');
          setApplyModal({ isOpen: false });
          fetchData();
          setActiveTab('schedule');
        } catch (err) { alert('오류 발생!'); }
        setLoading(false);
      };

      // --- 미팅 응답 (승인/조정/거절) ---
      const handleReplyMeeting = async (e) => {
        e.preventDefault();
        const { meetingId, type } = replyModal;
        let status = '';
        let msg = '';
        
        if (type === 'approve') status = '승인 완료';
        if (type === 'reschedule') {
          status = '일정 조정 요청';
          msg = `[변경 희망: ${e.target.newTime.value}] ` + e.target.replyMessage.value;
        }
        if (type === 'reject') {
          status = '일정상 진행 불가';
          msg = e.target.replyMessage?.value || '';
        }

        setLoading(true);
        try {
          await fetch(ONLINE_GAS_URL, {
            method: 'POST',
            body: JSON.stringify({
              action: 'update_meeting',
              data: { id: meetingId, status, message: msg }
            })
          });
          alert('정상적으로 처리되었습니다.');
          setReplyModal({ isOpen: false });
          fetchData();
        } catch (err) { alert('오류 발생!'); }
        setLoading(false);
      };

      // --- 랜더링 ---
      if (!user) {
        return (
          <div className="min-h-screen flex items-center justify-center p-4">
            <div className="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md">
              <h1 className="text-2xl font-bold text-center mb-6 text-blue-900">온라인 미팅 라운지 로그인</h1>
              <form onSubmit={handleLogin} className="space-y-4">
                <div className="flex gap-4 mb-4">
                  <label className="flex items-center"><input type="radio" checked={loginForm.type === 'company'} onChange={()=>setLoginForm({...loginForm, type: 'company'})} className="mr-2"/> 국내 기업</label>
                  <label className="flex items-center"><input type="radio" checked={loginForm.type === 'buyer'} onChange={()=>setLoginForm({...loginForm, type: 'buyer'})} className="mr-2"/> 해외 바이어</label>
                </div>
                <input type="text" placeholder="아이디" value={loginForm.id} onChange={e=>setLoginForm({...loginForm, id:e.target.value})} className="w-full p-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" />
                <input type="password" placeholder="비밀번호" value={loginForm.pw} onChange={e=>setLoginForm({...loginForm, pw:e.target.value})} className="w-full p-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" />
                <button type="submit" className="w-full bg-blue-600 text-white font-bold p-3 rounded-lg hover:bg-blue-700">입장하기</button>
              </form>
            </div>
          </div>
        );
      }

      // 내 파트너 목록 (기업은 바이어를, 바이어는 기업을 봄)
      const partnerType = user.type === 'company' ? 'buyer' : 'company';
      const partners = profiles.filter(p => p.userType === partnerType);
      
      const mySentMeetings = meetings.filter(m => m.requesterId === user.id);
      const myReceivedMeetings = meetings.filter(m => m.receiverId === user.id);

      return (
        <div className="max-w-5xl mx-auto p-4 sm:p-6 pb-20">
          <header className="flex justify-between items-center mb-8 border-b pb-4">
            <h1 className="text-2xl font-bold text-blue-900">B2B 온라인 미팅 센터</h1>
            <div className="flex items-center gap-4">
              <span className="font-semibold text-gray-600">환영합니다, {user.id}님</span>
              <button onClick={() => window.location.reload()} className="text-sm bg-gray-200 px-3 py-1 rounded hover:bg-gray-300">로그아웃</button>
            </div>
          </header>

          <nav className="flex gap-2 mb-6 bg-white p-2 rounded-lg shadow-sm border">
            <button onClick={() => setActiveTab('partners')} className={`flex-1 py-2 font-bold rounded ${activeTab==='partners'?'bg-blue-100 text-blue-700':'text-gray-500 hover:bg-gray-50'}`}>참가자 리스트 및 신청</button>
            <button onClick={() => setActiveTab('schedule')} className={`flex-1 py-2 font-bold rounded ${activeTab==='schedule'?'bg-blue-100 text-blue-700':'text-gray-500 hover:bg-gray-50'}`}>내 미팅 일정 확인</button>
            <button onClick={() => setActiveTab('profile')} className={`flex-1 py-2 font-bold rounded ${activeTab==='profile'?'bg-blue-100 text-blue-700':'text-gray-500 hover:bg-gray-50'}`}>내 프로필 관리</button>
          </nav>

          {/* 탭 1: 파트너 목록 */}
          {activeTab === 'partners' && (
            <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
              {partners.length === 0 ? <p className="col-span-full text-center py-10 text-gray-500">아직 등록된 {user.type === 'company' ? '바이어' : '기업'}가 없습니다.</p> : null}
              {partners.map(p => (
                <div key={p.userId} className="bg-white p-5 rounded-xl border shadow-sm flex flex-col justify-between">
                  <div>
                    <div className="text-xs text-blue-500 font-bold mb-1">{p.profileData.country || '국가 미상'}</div>
                    <h3 className="text-lg font-bold text-gray-800 mb-2">{p.profileData.name || p.userId}</h3>
                    <p className="text-sm text-gray-600 mb-4 line-clamp-2">{p.profileData.intro || '소개 내용이 없습니다.'}</p>
                    <div className="text-xs text-gray-500 mb-4">담당자: {p.profileData.manager || '-'} | 웹사이트: {p.profileData.website || '-'}</div>
                  </div>
                  <button onClick={() => setApplyModal({ isOpen: true, targetId: p.userId, targetName: p.profileData.name || p.userId })} className="w-full bg-blue-600 text-white font-bold py-2 rounded hover:bg-blue-700">미팅 신청하기</button>
                </div>
              ))}
            </div>
          )}

          {/* 탭 2: 내 일정 확인 */}
          {activeTab === 'schedule' && (
            <div className="space-y-8">
              {/* 받은 신청 */}
              <div className="bg-white p-5 rounded-xl border shadow-sm">
                <h3 className="text-lg font-bold text-gray-800 mb-4 flex items-center">📥 내가 받은 미팅 신청</h3>
                <div className="overflow-x-auto">
                  <table className="w-full text-sm text-left">
                    <thead className="bg-gray-100">
                      <tr><th className="p-3">신청자</th><th className="p-3">희망 시간</th><th className="p-3">메시지</th><th className="p-3">상태</th><th className="p-3 text-center">응답 / 입장</th></tr>
                    </thead>
                    <tbody>
                      {myReceivedMeetings.length===0 && <tr><td colSpan="5" className="text-center p-6 text-gray-400">받은 신청이 없습니다.</td></tr>}
                      {myReceivedMeetings.map(m => (
                        <tr key={m.id} className="border-b">
                          <td className="p-3 font-bold">{m.requesterId}</td>
                          <td className="p-3 text-blue-700 font-semibold">{m.sessionTime}</td>
                          <td className="p-3 text-gray-600 max-w-xs truncate" title={m.message}>{m.message || '-'}</td>
                          <td className="p-3"><span className="bg-gray-100 px-2 py-1 rounded text-xs font-bold">{m.status}</span></td>
                          <td className="p-3 text-center">
                            {m.status === '검토 중' && (
                              <div className="flex gap-1 justify-center">
                                <button onClick={() => setReplyModal({isOpen:true, meetingId: m.id, type:'approve'})} className="bg-green-500 text-white px-2 py-1 rounded text-xs hover:bg-green-600">승인</button>
                                <button onClick={() => setReplyModal({isOpen:true, meetingId: m.id, type:'reschedule'})} className="bg-yellow-500 text-white px-2 py-1 rounded text-xs hover:bg-yellow-600">조정</button>
                                <button onClick={() => setReplyModal({isOpen:true, meetingId: m.id, type:'reject'})} className="bg-red-500 text-white px-2 py-1 rounded text-xs hover:bg-red-600">거절</button>
                              </div>
                            )}
                            {m.status === '승인 완료' && m.zoomLink && (
                              <a href={m.zoomLink} target="_blank" className="bg-blue-600 text-white px-3 py-1.5 rounded text-xs font-bold inline-block hover:bg-blue-700">Zoom 입장</a>
                            )}
                          </td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>

              {/* 보낸 신청 */}
              <div className="bg-white p-5 rounded-xl border shadow-sm">
                <h3 className="text-lg font-bold text-gray-800 mb-4 flex items-center">📤 내가 보낸 미팅 신청</h3>
                <div className="overflow-x-auto">
                  <table className="w-full text-sm text-left">
                    <thead className="bg-gray-100">
                      <tr><th className="p-3">피신청자</th><th className="p-3">신청 시간</th><th className="p-3">상태 및 회신 메시지</th><th className="p-3 text-center">Zoom 입장</th></tr>
                    </thead>
                    <tbody>
                      {mySentMeetings.length===0 && <tr><td colSpan="4" className="text-center p-6 text-gray-400">보낸 신청이 없습니다.</td></tr>}
                      {mySentMeetings.map(m => (
                        <tr key={m.id} className="border-b">
                          <td className="p-3 font-bold">{m.receiverId}</td>
                          <td className="p-3 text-blue-700 font-semibold">{m.sessionTime}</td>
                          <td className="p-3">
                            <span className="bg-gray-100 px-2 py-1 rounded text-xs font-bold mr-2">{m.status}</span>
                            <span className="text-xs text-gray-500">{m.status === '일정 조정 요청' || m.status === '일정상 진행 불가' ? `사유: ${m.message}` : ''}</span>
                          </td>
                          <td className="p-3 text-center">
                            {m.status === '승인 완료' ? (
                              m.zoomLink ? <a href={m.zoomLink} target="_blank" className="bg-blue-600 text-white px-3 py-1.5 rounded text-xs font-bold hover:bg-blue-700">Zoom 입장</a> : <span className="text-xs text-gray-400">링크 대기중</span>
                            ) : '-'}
                          </td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>
            </div>
          )}

          {/* 탭 3: 프로필 관리 */}
          {activeTab === 'profile' && (
            <div className="bg-white p-6 rounded-xl border shadow-sm max-w-2xl mx-auto">
              <h3 className="text-lg font-bold text-gray-800 mb-4">내 회사 프로필 작성</h3>
              <p className="text-sm text-gray-500 mb-6">작성하신 내용은 파트너가 미팅 신청 시 참고하게 됩니다.</p>
              <div className="space-y-4">
                <div><label className="block text-sm font-bold mb-1">회사명</label><input type="text" value={myProfile.name} onChange={e=>setMyProfile({...myProfile, name:e.target.value})} className="w-full p-2 border rounded" /></div>
                <div className="flex gap-4">
                  <div className="flex-1"><label className="block text-sm font-bold mb-1">국가</label><input type="text" value={myProfile.country} onChange={e=>setMyProfile({...myProfile, country:e.target.value})} className="w-full p-2 border rounded" /></div>
                  <div className="flex-1"><label className="block text-sm font-bold mb-1">담당자(직책)</label><input type="text" value={myProfile.manager} onChange={e=>setMyProfile({...myProfile, manager:e.target.value})} className="w-full p-2 border rounded" /></div>
                </div>
                <div><label className="block text-sm font-bold mb-1">회사 소개</label><textarea value={myProfile.intro} onChange={e=>setMyProfile({...myProfile, intro:e.target.value})} className="w-full p-2 border rounded h-24" placeholder="회사 소개를 입력하세요"></textarea></div>
                <div><label className="block text-sm font-bold mb-1">주요 제품 / 관심 품목</label><input type="text" value={myProfile.products} onChange={e=>setMyProfile({...myProfile, products:e.target.value})} className="w-full p-2 border rounded" /></div>
                <div><label className="block text-sm font-bold mb-1">홈페이지</label><input type="text" value={myProfile.website} onChange={e=>setMyProfile({...myProfile, website:e.target.value})} className="w-full p-2 border rounded" placeholder="https://" /></div>
                <button onClick={saveProfile} className="w-full mt-4 bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-700">{loading ? '저장 중...' : '프로필 저장하기'}</button>
              </div>
            </div>
          )}

          {/* 신청 모달 */}
          {applyModal.isOpen && (
            <div className="fixed inset-0 bg-black/60 flex items-center justify-center p-4 z-50">
              <form onSubmit={handleApplyMeeting} className="bg-white rounded-xl p-6 w-full max-w-sm">
                <h3 className="font-bold text-lg mb-4">[{applyModal.targetName}]에게 미팅 신청</h3>
                <div className="mb-4">
                  <label className="block text-sm font-bold mb-2">희망 시간 선택</label>
                  <select name="time" required className="w-full p-2 border rounded outline-none focus:border-blue-500">
                    <option value="">-- 시간 선택 --</option>
                    {TIME_SLOTS.map(t => <option key={t} value={t}>{t}</option>)}
                  </select>
                </div>
                <div className="mb-6">
                  <label className="block text-sm font-bold mb-2">요청 메시지 (선택)</label>
                  <textarea name="message" className="w-full p-2 border rounded resize-none h-20" placeholder="간단한 인사말이나 논의 안건을 적어주세요."></textarea>
                </div>
                <div className="flex gap-2 justify-end">
                  <button type="button" onClick={() => setApplyModal({isOpen:false})} className="px-4 py-2 border rounded hover:bg-gray-50">취소</button>
                  <button type="submit" disabled={loading} className="px-4 py-2 bg-blue-600 text-white rounded font-bold">{loading ? '처리중...' : '신청하기'}</button>
                </div>
              </form>
            </div>
          )}

          {/* 응답 모달 */}
          {replyModal.isOpen && (
            <div className="fixed inset-0 bg-black/60 flex items-center justify-center p-4 z-50">
              <form onSubmit={handleReplyMeeting} className="bg-white rounded-xl p-6 w-full max-w-sm">
                <h3 className="font-bold text-lg mb-4">
                  {replyModal.type === 'approve' ? '미팅 승인' : replyModal.type === 'reschedule' ? '일정 조정 요청' : '진행 불가 안내'}
                </h3>
                
                {replyModal.type === 'approve' && <p className="text-sm text-gray-600 mb-4">이 미팅을 승인하시겠습니까? 승인 후 관리자가 Zoom 링크를 배포합니다.</p>}
                
                {replyModal.type === 'reschedule' && (
                  <div className="mb-4">
                    <label className="block text-sm font-bold mb-1">변경 희망 시간</label>
                    <select name="newTime" required className="w-full p-2 border rounded mb-3">
                      <option value="">-- 시간 선택 --</option>
                      {TIME_SLOTS.map(t => <option key={t} value={t}>{t}</option>)}
                    </select>
                    <label className="block text-sm font-bold mb-1">전달할 메시지</label>
                    <input type="text" name="replyMessage" required placeholder="예: 이 시간으로 변경 가능할까요?" className="w-full p-2 border rounded" />
                  </div>
                )}

                {replyModal.type === 'reject' && (
                  <div className="mb-4">
                    <label className="block text-sm font-bold mb-1">사유 기재 (선택)</label>
                    <input type="text" name="replyMessage" placeholder="예: 일정상 진행이 어렵습니다." className="w-full p-2 border rounded" />
                  </div>
                )}

                <div className="flex gap-2 justify-end mt-2">
                  <button type="button" onClick={() => setReplyModal({isOpen:false})} className="px-4 py-2 border rounded hover:bg-gray-50">취소</button>
                  <button type="submit" disabled={loading} className="px-4 py-2 bg-blue-600 text-white rounded font-bold">확인</button>
                </div>
              </form>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
