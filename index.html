  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>B2B Connect | Business Lounge</title>
  
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <style>
    body { 
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
      background-color: #FAFAFA;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;

    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #E5E7EB; border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: #D1D5DB; }
    .fade-in { animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body class="text-gray-900 selection:bg-gray-900 selection:text-white">
  <div id="root"></div>

  <script type="text/babel" data-presets="react">
    const { useState, useEffect } = React;
    
    // ⚠️ 1. 미팅 저장소 웹앱 URL
    const ONLINE_GAS_URL = 'https://script.google.com/macros/s/AKfycbydg3IehXgFbRhAR6tkbUDG49FfaCVO2671p4eFeNsKRu7m-ux5Ty6WchTPqsCBvpOW/exec'; 
    
    // ⚠️ 2. 베이스 데이터(행사/참가자 기본 정보) 웹앱 URL
    const BASE_DB_URL = 'https://script.google.com/macros/s/AKfycbxO3gHGZbsBmjaX-hfFHP-s7trR6OEKj_Rw-3G5-B0ehMOC3JTl1h2r7rEF8M3XmsqO/exec';

    const DICTIONARY = {
      ko: {
        signInTitle: "대시보드 로그인", domestic: "국내 기업", buyer: "해외 바이어", userId: "사용자 ID", password: "비밀번호",
        idPlaceholder: "아이디를 입력하세요", pwPlaceholder: "비밀번호를 입력하세요", continue: "계속하기", workspace: "워크스페이스",
        signOut: "로그아웃", participants: "참가 기업", schedule: "미팅 일정", settings: "프로필 설정", timetable: "나의 시간표",
        adminTab: "전체 미팅 관리", adminCalendar: "관리자 캘린더", noPartners: "등록된 파트너가 없습니다.",
        manager: "담당자", website: "웹사이트", requestMeeting: "미팅 신청", receivedRequests: "받은 신청 목록",
        receivedDesc: "내가 받은 미팅 제안 목록입니다.", sentRequests: "보낸 신청 목록", sentDesc: "내가 보낸 미팅 신청 내역입니다.",
        thRequester: "신청자", thRecipient: "수신자", thTime: "시간대", thMessage: "상태 및 메시지", thStatus: "상태", thAction: "관리",
        noRequests: "받은 신청이 없습니다.", noSentRequests: "보낸 신청이 없습니다.", accept: "승인", reschedule: "일정 조정", decline: "거절",
        companyProfile: "기업 프로필", profileDesc: "상대방에게 보여질 기본 정보를 설정합니다.", companyName: "기업명",
        countryRegion: "국가 / 지역", contactPerson: "담당자명 (직함)", aboutCompany: "기업 소개", productsInterests: "주요 제품 / 관심 분야",
        websiteUrl: "웹사이트 URL", saveChanges: "변경사항 저장", saving: "저장 중...", with: "대상:", selectTime: "시간 선택",
        chooseSlot: "시간대를 선택하세요", messageOptional: "메시지 (선택사항)", addBriefNote: "간단한 메시지를 입력하세요...", cancel: "취소", close: "닫기",
        sendRequest: "신청서 보내기", sending: "전송 중...", acceptRequest: "신청 승인", acceptModalDesc: "이 미팅을 승인하시겠습니까? 승인 후 화상회의 링크가 발급됩니다.",
        proposeNewTime: "새로운 시간을 제안해주세요.", proposedTime: "제안 시간", noteToSender: "전달 메시지", declineRequest: "신청 거절",
        declineModalDesc: "거절 사유를 간단히 남겨주세요.", reasonOptional: "거절 사유 (선택사항)", typeBriefReason: "거절 사유를 적어주세요...", confirm: "확인",
        alertLoginInput: "아이디와 비밀번호를 입력해주세요.", alertWrongPw: "비밀번호가 일치하지 않습니다.", alertNoData: "등록된 정보가 없습니다. 관리자에게 문의하세요.",
        alertSaved: "프로필이 저장되었습니다.", alertError: "오류 발생!", companyTag: "국내 기업", buyerTag: "해외 바이어", unnamedEvent: "진행 중인 행사", waitingLink: "링크 대기 중"
      },
      en: {
        signInTitle: "Sign in to your dashboard", domestic: "Domestic Company", buyer: "Overseas Buyer", userId: "User ID", password: "Password",
        idPlaceholder: "Enter your ID", pwPlaceholder: "Enter your password", continue: "Continue", workspace: "Workspace",
        signOut: "Sign out", participants: "Participants", schedule: "Schedule", settings: "Settings", timetable: "Timetable",
        adminTab: "Admin Dashboard", adminCalendar: "Admin Calendar", noPartners: "No registered partners found.",
        manager: "Manager", website: "Website", requestMeeting: "Request Meeting", receivedRequests: "Received Requests",
        receivedDesc: "List of meeting proposals received by me.", sentRequests: "Sent Requests", sentDesc: "History of meeting requests sent by me.",
        thRequester: "Requester", thRecipient: "Recipient", thTime: "Time Slot", thMessage: "Message", thStatus: "Status", thAction: "Action",
        noRequests: "No requests found.", noSentRequests: "No sent requests.", accept: "Accept", reschedule: "Reschedule", decline: "Decline",
        companyProfile: "Company Profile", profileDesc: "Set up the basic information.", companyName: "Company Name",
        countryRegion: "Country / Region", contactPerson: "Contact Person (Title)", aboutCompany: "About Company", productsInterests: "Products / Interests",
        websiteUrl: "Website URL", saveChanges: "Save Changes", saving: "Saving...", with: "with", selectTime: "Select Time",
        chooseSlot: "Choose a time slot", messageOptional: "Message (Optional)", addBriefNote: "Add a brief note...", cancel: "Cancel", close: "Close",
        sendRequest: "Send Request", sending: "Sending...", acceptRequest: "Accept Request", acceptModalDesc: "Would you like to approve this meeting?",
        proposeNewTime: "Please propose a new time.", proposedTime: "Proposed Time", noteToSender: "Note to Sender", declineRequest: "Decline Request",
        declineModalDesc: "Please leave a brief reason for declining.", reasonOptional: "Reason (Optional)", typeBriefReason: "Type a brief reason...", confirm: "Confirm",
        alertLoginInput: "Please enter your ID and password.", alertWrongPw: "Password does not match.", alertNoData: "No registered information found.",
        alertSaved: "Profile saved successfully.", alertError: "An error occurred!", companyTag: "Company", buyerTag: "Buyer", unnamedEvent: "Current Event", waitingLink: "Waiting for link"
      }
    };

    const parseTimeSlots = (slots) => {
      if (Array.isArray(slots)) return slots;
      if (typeof slots === 'string') return slots.split(',').map(s => s.trim()).filter(Boolean);
      return ["09:00~10:00", "10:00~11:00", "13:00~14:00", "14:00~15:00"]; 
    };
    const DEFAULT_TIME_SLOTS = ["09:00~10:00", "10:00~11:00", "13:00~14:00", "14:00~15:00", "15:00~16:00"];

    function App() {
      const [lang, setLang] = useState(() => localStorage.getItem('b2b_meeting_lang') || 'ko');
      const [user, setUser] = useState(() => {
        const saved = localStorage.getItem('b2b_meeting_user');
        return saved ? JSON.parse(saved) : null;
      });
      
      const [activeTab, setActiveTab] = useState(user?.type === 'admin' ? 'admin_dashboard' : 'timetable');
      const [profiles, setProfiles] = useState([]);
      const [meetings, setMeetings] = useState([]);
      const [favorites, setFavorites] = useState([]);
      
      // 베이스 데이터 연동 상태
      const [baseData, setBaseData] = useState({ events: [], accounts: [] });
      
      const [eventInfo, setEventInfo] = useState(() => {
        const saved = localStorage.getItem('b2b_event_info');
        return saved ? JSON.parse(saved) : { name: '', timeSlots: [] };
      });
      const [loading, setLoading] = useState(false);
      const [notify, setNotify] = useState(''); 

      const [searchOpt, setSearchOpt] = useState({ keyword: '', type: 'all' });

      const [applyModal, setApplyModal] = useState({ isOpen: false, targetId: '', targetName: '' });
      const [replyModal, setReplyModal] = useState({ isOpen: false, meetingId: '', type: '' });
      const [detailModal, setDetailModal] = useState({ isOpen: false, profile: null });
      const [adminAddModal, setAdminAddModal] = useState({ isOpen: false, requesterId: '', receiverId: '', sessionTime: '' });
      const [msgModal, setMsgModal] = useState({ isOpen: false, text: '' });
      
      const [adminUserModal, setAdminUserModal] = useState({ isOpen: false, selectedEvent: '', userType: 'company', selectedAccountId: '', userId: '', password: '' });
const [accountManageEvent, setAccountManageEvent] = useState(''); // 계정 관리 탭의 선택된 행사
const [accountManageType, setAccountManageType] = useState('company'); // 'company' 또는 'buyer' 선택 탭
const [dashboardEvent, setDashboardEvent] = useState(''); // 전체 미팅 관리 탭 행사 필터
      const [loginForm, setLoginForm] = useState({ id: '', pw: '', type: 'company' });
      const [myProfile, setMyProfile] = useState({ name: '', country: '', manager: '', intro: '', products: '', website: '' });

      const handleLangChange = (newLang) => {
        setLang(newLang);
        localStorage.setItem('b2b_meeting_lang', newLang);
      };
      const t = DICTIONARY[lang];

      const fetchData = async () => {
        try {
          const res = await fetch(ONLINE_GAS_URL);
          const data = await res.json();
          setProfiles(data.profiles || []);
          setMeetings(data.meetings || []);
          setFavorites(data.favorites || []);
          
          if (user && user.type !== 'admin') {
            const me = (data.profiles || []).find(p => p.userId === user.id && p.userType === user.type);
            if (me) {
              setMyProfile(me.profileData);
              const userEventName = me.eventName || me.profileData?.eventName || t.unnamedEvent;
              const userTimeSlots = parseTimeSlots(me.timeSlots || me.profileData?.timeSlots);
              setEventInfo({ name: userEventName, timeSlots: userTimeSlots });
            }
            const pending = (data.meetings || []).filter(m => m.receiverId === user.id && m.status === '검토 중');
            if(pending.length > 0) setNotify(`새로운 미팅 신청이 ${pending.length}건 있습니다.`);
          }
        } catch (error) { console.error("Data load failed:", error); }
      };

      // 🌟 [수정 완료] 베이스 데이터 불러오기
      const fetchBaseData = async () => {
        if (!BASE_DB_URL || BASE_DB_URL.includes('여기에')) {
            console.warn("베이스 데이터 URL이 설정되지 않았습니다.");
            return;
        }
        try {
          const res = await fetch(BASE_DB_URL);
          const data = await res.json();
          setBaseData({ 
            events: data.events || [], 
            accounts: data.accounts || [] 
          });
        } catch (error) { 
          console.error("Base Data load failed", error); 
        }
      };

      useEffect(() => { 
        fetchData(); 
        if(user?.type === 'admin') fetchBaseData();
      }, [user]);

      const handleLogin = (e) => {
        e.preventDefault();
        if(!loginForm.id || !loginForm.pw) return alert(t.alertLoginInput);

        if (loginForm.id === 'Bridging' && loginForm.pw === 'bridging1004!!') {
            const adminUser = { id: 'Bridging', type: 'admin' };
            setUser(adminUser); setActiveTab('admin_dashboard');
            localStorage.setItem('b2b_meeting_user', JSON.stringify(adminUser));
            return;
        }
        
        const existingProfile = profiles.find(p => p.userId === loginForm.id && p.userType === loginForm.type);
        if (existingProfile) {
          if (existingProfile.profileData.password !== loginForm.pw) return alert(t.alertWrongPw);
          const userEventName = existingProfile.eventName || existingProfile.profileData?.eventName || t.unnamedEvent;
          const userTimeSlots = parseTimeSlots(existingProfile.timeSlots || existingProfile.profileData?.timeSlots);
          const newEventInfo = { name: userEventName, timeSlots: userTimeSlots };
          setEventInfo(newEventInfo);
          localStorage.setItem('b2b_event_info', JSON.stringify(newEventInfo));

          const loggedInUser = { id: loginForm.id, type: loginForm.type };
          setMyProfile(existingProfile.profileData);
          setUser(loggedInUser); setActiveTab('timetable');
          localStorage.setItem('b2b_meeting_user', JSON.stringify(loggedInUser));
        } else alert(t.alertNoData);
      };
      
      const handleLogout = () => {
        localStorage.removeItem('b2b_meeting_user');
        localStorage.removeItem('b2b_event_info');
        setUser(null); setLoginForm({ ...loginForm, id: '', pw: '' }); setNotify('');
      };

      const saveProfile = async () => {
        setLoading(true);
        try {
          await fetch(ONLINE_GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'save_profile', data: { userId: user.id, userType: user.type, profileData: myProfile } }) });
          alert(t.alertSaved); fetchData();
        } catch (e) { alert(t.alertError); }
        setLoading(false);
      };

      const toggleFavorite = async (targetId, e) => {
        e.stopPropagation();
        try {
          await fetch(ONLINE_GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'toggle_favorite', data: { userId: user.id, targetId } }) });
          fetchData();
        } catch(e) {}
      };

      const updateAdminMemo = async (id, memoText) => {
        await fetch(ONLINE_GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'update_meeting', data: { id, adminMemo: memoText }}) });
        fetchData();
      };

      // 🌟 [수정 완료] 베이스 데이터에서 유연하게 행사 이름 가져오기 
      const getParsedEvents = () => {
        let parsed = [];
        if (Array.isArray(baseData.events)) {
          parsed = baseData.events.map(e => {
            if (typeof e === 'string') return { id: e, name: e };
            return { id: e.id || e.eventName || e.name, name: e.name || e.eventName || e.title || e.id };
          });
        } else if (typeof baseData.events === 'object' && baseData.events !== null) {
          parsed = Object.keys(baseData.events).map(key => {
            const ev = baseData.events[key];
            return { id: key, name: ev.eventName || ev.name || ev.title || key };
          });
        }
        return parsed.filter(e => e.id || e.name);
      };

      const parsedEventsList = getParsedEvents();

     // 🌟 [수정 1] events 내부의 companies, buyers 데이터를 직접 추출하도록 필터링 로직 완벽 대응
      const getFilteredBaseAccounts = () => {
        const { selectedEvent, userType } = adminUserModal;
        if (!selectedEvent) return [];

        let targetEvent = null;
        
        // 1. baseData.events에서 선택된 행사 객체 찾기
        if (typeof baseData.events === 'object' && !Array.isArray(baseData.events)) {
           targetEvent = baseData.events[selectedEvent] || Object.values(baseData.events).find(ev => ev.id === selectedEvent || ev.eventName === selectedEvent);
        } else if (Array.isArray(baseData.events)) {
           targetEvent = baseData.events.find(ev => ev.id === selectedEvent || ev.eventName === selectedEvent);
        }

        let accounts = [];

        // 2. 행사 객체 안의 companies(국내기업) 또는 buyers(해외바이어) 배열 가져오기
        if (targetEvent) {
          if (userType === 'company') accounts = targetEvent.companies || [];
          else if (userType === 'buyer') accounts = targetEvent.buyers || [];
        }

        // 3. 기존 Accounts 시트(flat 데이터) 호환성 및 아이디 c/b 판별 로직 유지
        const flatAccounts = (baseData.accounts || []).filter(a => {
          const accEv = String(a.eventId || a.eventName || a.event || '').trim();
          const matchEv = (accEv === selectedEvent) || (targetEvent && accEv === targetEvent.eventName);
          if (!matchEv) return false;

          const accType = String(a.userType || a.type || a.role || a.구분 || '').toLowerCase();
          const accountId = String(a.id || a.userId || '').toLowerCase();
          
          if (userType === 'company') return ['company', '국내'].some(t => accType.includes(t)) || accountId.startsWith('c');
          if (userType === 'buyer') return ['buyer', '해외'].some(t => accType.includes(t)) || accountId.startsWith('b');
          return false;
        });

        // 4. 데이터 병합 및 화면 표시용 이름(companyName) 정규화
        const combined = [...accounts, ...flatAccounts];
        const unique = [];
        const seen = new Set();
        
        for (const acc of combined) {
          const id = acc.id || acc.userId || acc.company || acc.name; 
          if (!seen.has(id)) {
            seen.add(id);
            // 바이어는 'company', 기업은 'name'에 기업명이 있으므로 이를 통일해줍니다.
            const displayTitle = acc.company || acc.companyName || acc.name || acc.기업명;
            unique.push({ ...acc, id: id, companyName: displayTitle });
          }
        }
        return unique;
      };

      const filteredBaseAccounts = getFilteredBaseAccounts();

      // 🌟 [수정 2] 계정 생성 시 데이터 참조 대상을 baseData.accounts가 아닌 방금 추출한 filteredBaseAccounts로 변경
      const handleBaseAccountCreate = async (e) => {
        e.preventDefault();
        setLoading(true);
        const { selectedEvent, userType, selectedAccountId, userId, password } = adminUserModal;
        
        const targetEventObj = parsedEventsList.find(ev => ev.id === selectedEvent);
        const targetEventName = targetEventObj ? targetEventObj.name : selectedEvent;

        // 수정됨: 필터링된 배열에서 선택된 계정을 찾습니다.
        const baseAcc = filteredBaseAccounts.find(a => (a.id === selectedAccountId || a.companyName === selectedAccountId || a.name === selectedAccountId));
        const companyName = baseAcc ? (baseAcc.companyName || baseAcc.name || baseAcc.기업명 || baseAcc.회사명) : '';
        const country = baseAcc ? (baseAcc.country || baseAcc.Country || baseAcc.국가) : '';
        
        try {
          await fetch(ONLINE_GAS_URL, {
            method: 'POST',
            body: JSON.stringify({
              action: 'save_profile',
              data: { 
                userId: userId, 
                userType: userType, 
                eventName: targetEventName,
                profileData: { password: password, name: companyName, country: country } 
              }
            })
          });
          alert("계정이 성공적으로 생성되었습니다.");
          setAdminUserModal({...adminUserModal, isOpen: false, userId: '', password: ''});
          fetchData();
        } catch (err) { alert("계정 생성 실패"); }
        setLoading(false);
      };

      const handleApplyMeeting = async (e) => {
        e.preventDefault();
        const time = e.target.time.value;
        const rawMsg = e.target.message.value;
        const isDuplicate = meetings.some(m => (m.requesterId === user.id || m.receiverId === user.id) && m.sessionTime === time && m.status !== '일정상 진행 불가');
        if (isDuplicate) return alert(t.alertDuplicateTime);

        let initialMsg = rawMsg ? `[${new Date().toLocaleString('ko-KR')} - ${user.id}]\n${rawMsg}` : '';
        setLoading(true);
        try {
          await fetch(ONLINE_GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'request_meeting', data: { id: `mtg_${Date.now()}`, requesterId: user.id, receiverId: applyModal.targetId, sessionTime: time, message: initialMsg } }) });
          setApplyModal({ isOpen: false }); fetchData(); setActiveTab('schedule');
        } catch (err) {}
        setLoading(false);
      };

      const handleReplyMeeting = async (e) => {
        e.preventDefault();
        const { meetingId, type } = replyModal;
        let status = type === 'approve' ? '승인 완료' : type === 'reschedule' ? '일정 조정 요청' : '일정상 진행 불가';
        let newText = type === 'reschedule' ? `[희망시간: ${e.target.newTime.value}] ` + e.target.replyMessage.value : (e.target.replyMessage?.value || '');

        const currentMeeting = meetings.find(m => m.id === meetingId);
        let finalMsg = currentMeeting?.message || '';
        if (newText) {
          const logEntry = `[${new Date().toLocaleString('ko-KR')} - ${user.id}]\n${newText}`;
          finalMsg = finalMsg ? `${finalMsg}\n\n${logEntry}` : logEntry;
        }
        setLoading(true);
        try {
          await fetch(ONLINE_GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'update_meeting', data: { id: meetingId, status, message: finalMsg } }) });
          setReplyModal({ isOpen: false }); fetchData();
        } catch (err) {}
        setLoading(false);
      };

      const checkIsMyTurn = (m) => {
        if (m.status === '검토 중') return m.receiverId === user.id;
        if (m.status === '일정 조정 요청') {
          if (!m.message) return m.receiverId === user.id;
          const matches = m.message.match(/\[.*? - (.*?)\]/g);
          if (matches && matches.length > 0) {
            const lastSender = matches[matches.length - 1].replace(/\[.*? - (.*?)\]/, '$1');
            return lastSender !== user.id;
          }
          return m.receiverId === user.id;
        }
        return false;
      };

      const getStatusBadge = (status) => {
        let label = status;
        let style = "bg-gray-100 text-gray-800 border-gray-200"; 
        if (status === '승인 완료') { label = lang === 'ko' ? '승인 완료' : 'Approved'; style = "bg-blue-50 text-blue-600 border-blue-100"; }
        else if (status === '검토 중') { label = lang === 'ko' ? '검토 중' : 'Pending'; style = "bg-gray-100 text-gray-600 border-gray-200"; }
        else if (status === '일정상 진행 불가') { label = lang === 'ko' ? '거절됨' : 'Declined'; style = "bg-red-50 text-red-600 border-red-100"; }
        else if (status === '일정 조정 요청') { label = lang === 'ko' ? '조정 요청' : 'Reschedule'; style = "bg-orange-50 text-orange-600 border-orange-100"; }
        return <span className={`inline-flex items-center px-2 py-1 rounded-md text-[11px] font-bold tracking-wide uppercase border ${style}`}>{label}</span>;
      };

      const LanguageToggle = () => (
        <div className="inline-flex bg-gray-100 p-0.5 rounded-lg text-[11px] font-bold tracking-wide">
          <button type="button" onClick={() => handleLangChange('ko')} className={`px-2.5 py-1 rounded-md transition-all ${lang === 'ko' ? 'bg-white text-gray-900 shadow-sm' : 'text-gray-400 hover:text-gray-600'}`}>KO</button>
          <button type="button" onClick={() => handleLangChange('en')} className={`px-2.5 py-1 rounded-md transition-all ${lang === 'en' ? 'bg-white text-gray-900 shadow-sm' : 'text-gray-400 hover:text-gray-600'}`}>EN</button>
        </div>
      );

      // 로그인 안된 상태 화면
      if (!user) {
        return (
          <div className="min-h-screen flex flex-col items-center justify-center p-4 relative">
            <div className="absolute top-6 right-6">
              <LanguageToggle />
            </div>
            <div className="w-full max-w-sm fade-in">
              <div className="text-center mb-10">
                <div className="w-12 h-12 bg-gray-900 text-white rounded-2xl flex items-center justify-center text-xl font-bold mx-auto mb-6 shadow-xl">B.</div>
                <h1 className="text-2xl font-semibold tracking-tight text-gray-900 mb-2">B2B Connect</h1>
                <p className="text-sm text-gray-500">{t.signInTitle}</p>
              </div>
              <div className="bg-white p-8 rounded-3xl border border-gray-200/60 shadow-[0_8px_30px_rgb(0,0,0,0.04)]">
                <form onSubmit={handleLogin} className="space-y-6">
                  <div className="flex bg-gray-50 p-1 rounded-xl">
                    <label className={`flex-1 text-center py-2.5 rounded-lg cursor-pointer text-[13px] font-semibold transition-all ${loginForm.type === 'company' ? 'bg-white shadow-sm text-gray-900' : 'text-gray-400 hover:text-gray-600'}`}>
                      <input type="radio" className="hidden" checked={loginForm.type === 'company'} onChange={()=>setLoginForm({...loginForm, type: 'company'})} />
                      {t.domestic}
                    </label>
                    <label className={`flex-1 text-center py-2.5 rounded-lg cursor-pointer text-[13px] font-semibold transition-all ${loginForm.type === 'buyer' ? 'bg-white shadow-sm text-gray-900' : 'text-gray-400 hover:text-gray-600'}`}>
                      <input type="radio" className="hidden" checked={loginForm.type === 'buyer'} onChange={()=>setLoginForm({...loginForm, type: 'buyer'})} />
                      {t.buyer}

                    <div>
                      <label className="block text-[11px] font-bold text-gray-500 uppercase tracking-wider mb-2">{t.userId}</label>
                      <input type="text" value={loginForm.id} onChange={e=>setLoginForm({...loginForm, id:e.target.value})} className="w-full px-4 py-3 bg-gray-50/50 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-gray-900/10 focus:border-gray-900 transition-all placeholder-gray-400" placeholder={t.idPlaceholder} />

                      <input type="password" value={loginForm.pw} onChange={e=>setLoginForm({...loginForm, pw:e.target.value})} className="w-full px-4 py-3 bg-gray-50/50 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-gray-900/10 focus:border-gray-900 transition-all placeholder-gray-400" placeholder={t.pwPlaceholder} />
                    </div>
                  </div>
                  <button type="submit" className="w-full bg-gray-900 text-white font-medium text-sm py-3.5 rounded-xl hover:bg-black hover:shadow-lg hover:-translate-y-0.5 transition-all duration-200">
                    {t.continue} &rarr;
                  </button>
                </form>

            </div>

      }

      // 파트너 필터링 (행사 필터 + 검색 필터 + 즐겨찾기 정렬)
      const partnerType = user.type === 'company' ? 'buyer' : 'company';
      let filteredPartners = profiles.filter(p => p.userType === partnerType && (p.eventName || p.profileData?.eventName || t.unnamedEvent) === eventInfo.name);
      
      if (searchOpt.keyword) {
        const kw = searchOpt.keyword.toLowerCase();
        filteredPartners = filteredPartners.filter(p => {
          const d = p.profileData;
          if (searchOpt.type === 'name') return (d.name||'').toLowerCase().includes(kw);
          if (searchOpt.type === 'country') return (d.country||'').toLowerCase().includes(kw);
          if (searchOpt.type === 'product') return (d.products||'').toLowerCase().includes(kw);
          return (d.name||'').toLowerCase().includes(kw) || (d.country||'').toLowerCase().includes(kw) || (d.products||'').toLowerCase().includes(kw);
        });
      }
      
      filteredPartners.sort((a,b) => {
        const aFav = favorites.some(f => f.userId === user.id && f.targetId === a.userId);
        const bFav = favorites.some(f => f.userId === user.id && f.targetId === b.userId);
        return (aFav === bFav) ? 0 : aFav ? -1 : 1;
      });

      const mySentMeetings = meetings.filter(m => m.requesterId === user.id);
      const myReceivedMeetings = meetings.filter(m => m.receiverId === user.id);

     // 🌟 [수정] 관리자 대시보드(전체 미팅 및 통계) 필터링 로직
      const selectedDashEventObj = parsedEventsList.find(e => e.id === dashboardEvent);
      const targetDashEvName = selectedDashEventObj ? selectedDashEventObj.name : dashboardEvent;

      const filteredDashboardMeetings = meetings.filter(m => {
        if (!dashboardEvent) return true; // 아무것도 선택 안 하면 전체 보기
        const reqProfile = profiles.find(p => p.userId === m.requesterId);
        const mEvName = reqProfile ? (reqProfile.eventName || reqProfile.profileData?.eventName) : '';
        return mEvName === targetDashEvName;
      });

      const dashboardProfiles = profiles.filter(p => {
        if (!dashboardEvent) return true;
        const pEvName = p.eventName || p.profileData?.eventName;
        return pEvName === targetDashEvName;
      });

      const totalCompanies = dashboardProfiles.filter(p => p.userType === 'company').length;
      const totalBuyers = dashboardProfiles.filter(p => p.userType === 'buyer').length;
      const approvedMtg = filteredDashboardMeetings.filter(m => m.status === '승인 완료').length;
      const pendingMtg = filteredDashboardMeetings.filter(m => m.status === '검토 중' || m.status === '일정 조정 요청').length;
      const rejectedMtg = filteredDashboardMeetings.filter(m => m.status === '일정상 진행 불가').length;

      // 캘린더는 행사 필터에 관계없이 전체 시간대를 유지하거나 나중에 분리하기 위해 원본 유지
      const meetingsByTime = meetings.reduce((acc, m) => {
        if (!acc[m.sessionTime]) acc[m.sessionTime] = [];
        acc[m.sessionTime].push(m);
        return acc;
      }, {});

// 🌟 [엔진 추가] 원본 데이터의 행사 config를 바탕으로 정확한 세션 시간표를 추출하는 함수
      const generateTimeSlotsFromConfig = (config) => {
        if (!config) return [];
        const startTime = config.startTime || "10:00";
        const sessionLength = parseInt(config.sessionLength || 30);
        const sessionsPerDay = parseInt(config.sessionsPerDay || 10);
        const lunchStart = config.lunchStart;
        const lunchEnd = config.lunchEnd;

        const parseMin = (s) => {
          const [h, m] = s.split(':').map(Number);
          return h * 60 + m;
        };
        const formatMin = (m) => {
          const h = Math.floor(m / 60).toString().padStart(2, '0');
          const min = (m % 60).toString().padStart(2, '0');
          return `${h}:${min}`;
        };

        let current = parseMin(startTime);
        const lunchS = lunchStart ? parseMin(lunchStart) : -1;
        const lunchE = lunchEnd ? parseMin(lunchEnd) : -1;

        const slots = [];
        let count = 0;
        
        // 무한루프 방지 및 세션 개수만큼 시간대 생성
        for (let i = 0; i < 50 && count < sessionsPerDay; i++) {
          let start = current;
          let end = current + sessionLength;

          // 세션 시작 시간이 점심시간에 걸쳐있으면 점심시간 끝나는 시간으로 강제 점프
          if (lunchS !== -1 && lunchE !== -1) {
            if (start >= lunchS && start < lunchE) {
              current = lunchE;
              continue;
            }
          }

          slots.push(`${formatMin(start)}~${formatMin(end)}`);
          current = end;
          count++;
        }
        return slots;
      };

     // 🌟 [수정 완료] 계정 목록 추출 및 행사 맞춤형 ID 규칙 생성
      const getEventAccountsList = () => {
        const targetEvent = parsedEventsList.find(e => e.id === accountManageEvent);
        if (!targetEvent) return { companies: [], buyers: [], timeSlots: [], eventData: null }; // 💡 eventData 방어 코드 추가

        // 원본 데이터 전체에서 해당 행사 원본 오브젝트 찾기
        const rawEventObj = baseData.events[accountManageEvent] || Object.values(baseData.events).find(ev => ev.id === accountManageEvent);
        const calculatedSlots = generateTimeSlotsFromConfig(rawEventObj?.config);

        const mapAccount = (acc, type, idx) => {
          const originalId = acc.id || acc.userId;
          const name = acc.company || acc.companyName || acc.name || acc.기업명;
          const profile = profiles.find(p => p.profileData?.name === name || p.userId === originalId);
          // 규칙 반영: company1, company2... / buyer1, buyer2...
          const defaultGeneratedId = `${type === 'company' ? 'company' : 'buyer'}${idx}`;

          return {
            ...acc, originalId, displayName: name, type,
            isRegistered: !!profile,
            registeredId: profile ? profile.userId : '',
            password: profile ? profile.profileData.password : '',
            defaultGeneratedId
          };
        };

        return {
          companies: (rawEventObj?.companies || []).map((c, i) => mapAccount(c, 'company', i + 1)),
          buyers: (rawEventObj?.buyers || []).map((b, i) => mapAccount(b, 'buyer', i + 1)),
          timeSlots: calculatedSlots,
          eventData: rawEventObj // 💡 누락되었던 행사 원본 데이터를 다시 추가!
        };
      };

      const accountList = getEventAccountsList();

      // 개별 계정 생성 (행사 세션 시간표를 DB에 영구 주입)
      const quickCreateAccount = async (acc) => {
          const customId = document.getElementById(`id_${acc.originalId}`)?.value || acc.defaultGeneratedId;
          const customPw = document.getElementById(`pw_${acc.originalId}`)?.value || '1234';
          
          if (!customId || !customPw) return alert("아이디와 비밀번호를 입력해주세요.");
          if (!confirm(`[${acc.displayName}]\n아이디: ${customId}\n비밀번호: ${customPw}\n\n위 설정과 행사의 진짜 세션 정보로 계정을 생성하시겠습니까?`)) return;
          
          setLoading(true);
          const targetEventObj = parsedEventsList.find(ev => ev.id === accountManageEvent);
          const targetEventName = targetEventObj ? targetEventObj.name : accountManageEvent;
          const timeSlotsStr = accountList.timeSlots.join(','); // 진짜 세션 리스트

          try {
              await fetch(ONLINE_GAS_URL, {
                  method: 'POST',
                  body: JSON.stringify({
                    action: 'save_profile',
                    data: { 
                      userId: customId, 
                      userType: acc.type, 
                      eventName: targetEventName,
                      timeSlots: timeSlotsStr, // 상위 필드 주입
                      profileData: { password: customPw, name: acc.displayName, country: acc.country || acc.countryRegion || '한국', timeSlots: timeSlotsStr } // 프로필 내 주입
                    }
                  })
              });
              fetchData(); 
          } catch(e) { alert("오류 발생"); }
          setLoading(false);
      };

      // 일괄 자동 생성 (행사 세션 시간표를 모든 미생성 계정에 완벽 주입)
      const bulkCreateMissingAccounts = async (type) => {
          const targetList = type === 'company' ? accountList.companies : accountList.buyers;
          const missing = targetList.filter(a => !a.isRegistered);
          if (missing.length === 0) return alert("모든 계정이 이미 생성되어 있습니다.");
          if (!confirm(`미생성된 명단 ${missing.length}개의 계정을 일괄 생성합니다.\n(원본 데이터 세션 일정이 자동 연동됩니다)\n\n계속하시겠습니까?`)) return;

          setLoading(true);
          const targetEventObj = parsedEventsList.find(ev => ev.id === accountManageEvent);
          const targetEventName = targetEventObj ? targetEventObj.name : accountManageEvent;
          const timeSlotsStr = accountList.timeSlots.join(',');

          for (const acc of missing) {
              const customId = document.getElementById(`id_${acc.originalId}`)?.value || acc.defaultGeneratedId;
              const customPw = document.getElementById(`pw_${acc.originalId}`)?.value || '1234';
              try {
                  await fetch(ONLINE_GAS_URL, {
                      method: 'POST',
                      body: JSON.stringify({ 
                        action: 'save_profile', 
                        data: { 
                          userId: customId, 
                          userType: acc.type, 
                          eventName: targetEventName,
                          timeSlots: timeSlotsStr,
                          profileData: { password: customPw, name: acc.displayName, country: acc.country || acc.countryRegion || '한국', timeSlots: timeSlotsStr }
                        } 
                      })
                  });
              } catch(e) { console.error(e); }
          }
          alert("모든 명단의 계정 생성이 완료되었습니다!");
          fetchData();
          setLoading(false);
      };      return (
        <div className="max-w-6xl mx-auto p-6 sm:p-10 pb-32 fade-in relative">
          {notify && (
            <div className="bg-gray-900 text-white px-6 py-4 rounded-2xl mb-8 flex justify-between items-center shadow-lg border border-gray-800">
              <span className="font-bold text-sm">🔔 알림: {notify}</span>
              <button onClick={() => setNotify('')} className="font-bold text-gray-400 hover:text-white">✕</button>
            </div>

          <header className="flex justify-between items-center py-4 border-b border-gray-200 mb-10">
            <div className="flex items-center gap-3">
              <div className="w-9 h-9 bg-gray-900 text-white rounded-xl flex items-center justify-center text-sm font-bold shadow-sm">B.</div>
              <div>
                <h1 className="text-lg font-bold tracking-tight text-gray-900 leading-none mb-1">
                  {user.type === 'admin' ? '운영 관리자 시스템' : eventInfo.name}

                <p className="text-sm font-medium text-gray-900">{user.id}</p>
              </div>
              <div className="w-px h-8 bg-gray-200"></div>
              <LanguageToggle />
              <button onClick={handleLogout} className="text-sm font-medium text-gray-400 hover:text-gray-900 transition-colors">{t.signOut}</button>
            </div>
          </header>

          <div className="flex overflow-x-auto mb-10 pb-2">
            <div className="inline-flex bg-gray-100 p-1 rounded-xl">
            {user.type === 'admin' ? (
              <>
                <button onClick={() => setActiveTab('admin_dashboard')} className={`px-6 py-2.5 text-sm font-semibold rounded-lg transition-all ${activeTab==='admin_dashboard'?'bg-white text-gray-900 shadow-sm':'text-gray-500 hover:text-gray-700'}`}>{t.adminTab}</button>
                <button onClick={() => setActiveTab('admin_calendar')} className={`px-6 py-2.5 text-sm font-semibold rounded-lg transition-all ${activeTab==='admin_calendar'?'bg-white text-gray-900 shadow-sm':'text-gray-500 hover:text-gray-700'}`}>{t.adminCalendar}</button>
<button onClick={() => setActiveTab('admin_accounts')} className={`px-6 py-2.5 text-sm font-semibold rounded-lg transition-all ${activeTab==='admin_accounts'?'bg-white text-gray-900 shadow-sm':'text-gray-500 hover:text-gray-700'}`}>계정 관리</button>
              </>
            ) : (
              <>
                <button onClick={() => setActiveTab('timetable')} className={`px-6 py-2.5 text-sm font-semibold rounded-lg transition-all ${activeTab==='timetable'?'bg-white text-gray-900 shadow-sm':'text-gray-500 hover:text-gray-700'}`}>{t.timetable}</button>
                <button onClick={() => setActiveTab('partners')} className={`px-6 py-2.5 text-sm font-semibold rounded-lg transition-all ${activeTab==='partners'?'bg-white text-gray-900 shadow-sm':'text-gray-500 hover:text-gray-700'}`}>{t.participants}</button>
                <button onClick={() => setActiveTab('schedule')} className={`px-6 py-2.5 text-sm font-semibold rounded-lg transition-all ${activeTab==='schedule'?'bg-white text-gray-900 shadow-sm':'text-gray-500 hover:text-gray-700'}`}>{t.schedule}</button>
                <button onClick={() => setActiveTab('profile')} className={`px-6 py-2.5 text-sm font-semibold rounded-lg transition-all ${activeTab==='profile'?'bg-white text-gray-900 shadow-sm':'text-gray-500 hover:text-gray-700'}`}>{t.settings}</button>
              </>

            </div>

          <div className="fade-in" key={activeTab}>
            {/* 일반 탭 0: 나의 시간표 */}
            {activeTab === 'timetable' && user.type !== 'admin' && (
              <div className="bg-white p-8 rounded-3xl shadow-sm border border-gray-200/80">
                <h2 className="text-xl font-bold mb-6 border-b border-gray-100 pb-4">나의 미팅 시간표</h2>

                  {(eventInfo.timeSlots.length > 0 ? eventInfo.timeSlots : DEFAULT_TIME_SLOTS).map(time => {
                    const mtg = meetings.find(m => (m.requesterId === user.id || m.receiverId === user.id) && m.sessionTime === time && m.status === '승인 완료');
                    return (
                      <div key={time} className="flex flex-col sm:flex-row border border-gray-100 rounded-2xl p-5 bg-gray-50/50 items-center hover:bg-gray-50 transition">
                        <div className="w-36 font-bold text-blue-600 text-lg">{time}</div>
                        <div className="flex-1 w-full mt-3 sm:mt-0">
                          {mtg ? (
                            <div className="flex justify-between items-center w-full">
                              <span className="font-bold text-gray-900 text-lg">미팅 대상: {mtg.requesterId === user.id ? mtg.receiverId : mtg.requesterId}</span>
                              {mtg.zoomLink && <a href={mtg.zoomLink} target="_blank" className="bg-white text-blue-700 px-5 py-2.5 rounded-xl font-bold text-sm border border-blue-200 hover:bg-blue-50 transition shadow-sm">Zoom 입장</a>}
                            </div>
                          ) : <span className="text-gray-400 font-medium">일정 없음</span>}
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            )}

            {/* 일반 탭 1: 참가 파트너 리스트 */}
            {activeTab === 'partners' && user.type !== 'admin' && (
              <div>
                <div className="flex gap-3 mb-8 bg-white p-3 rounded-2xl shadow-sm border border-gray-200/80 items-center">
                  <select className="border-none bg-gray-50 text-gray-700 font-semibold px-4 py-3 rounded-xl text-sm outline-none ring-1 ring-gray-200 focus:ring-gray-900" value={searchOpt.type} onChange={e=>setSearchOpt({...searchOpt, type: e.target.value})}>
                    <option value="all">전체 검색</option><option value="name">기업명</option>
                    <option value="country">국가</option><option value="product">품목</option>
                  </select>
                  <input type="text" className="flex-1 border-none bg-gray-50 px-4 py-3 rounded-xl text-sm outline-none ring-1 ring-gray-200 focus:ring-gray-900" placeholder="검색어를 입력하세요..." value={searchOpt.keyword} onChange={e=>setSearchOpt({...searchOpt, keyword: e.target.value})} />
                </div>

                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                  {filteredPartners.length === 0 && (
                    <div className="col-span-full py-20 text-center border border-dashed border-gray-200 rounded-2xl">
                      <p className="text-sm text-gray-500">{t.noPartners}</p>
                    </div>
                  )}
                  {filteredPartners.map(p => {
                    const isFav = favorites.some(f => f.userId === user.id && f.targetId === p.userId);
                    return (
                      <div key={p.userId} onClick={() => setDetailModal({ isOpen: true, profile: p })} className="bg-white p-7 rounded-2xl border border-gray-200/80 shadow-[0_2px_10px_-4px_rgba(0,0,0,0.05)] hover:border-gray-300 hover:shadow-[0_8px_30px_-4px_rgba(0,0,0,0.08)] transition-all duration-300 flex flex-col h-full group cursor-pointer relative">
                        <button onClick={(e) => toggleFavorite(p.userId, e)} className="absolute top-6 right-6 text-2xl transition-transform hover:scale-110" title="즐겨찾기">{isFav ? '⭐' : '☆'}</button>
                        
                        <div className="flex justify-between items-start mb-6 pr-8">
                          <span className="px-2.5 py-1 bg-gray-50 text-gray-600 rounded-md text-[11px] font-bold tracking-wide uppercase border border-gray-100">{p.profileData.country || 'Unknown'}</span>
                          <span className="text-[11px] font-medium text-gray-400">{p.userId}</span>

                      </button>
                    </div>

                    {/* 국내 기업 선택시 노출 */}
                    {accountManageType === 'company' && (
                      <div className="fade-in">
                        <div className="flex justify-between items-center mb-4 gap-4">
                          <h3 className="text-base font-bold text-gray-900 flex items-center gap-2 whitespace-nowrap">
                            <span className="w-2 h-2 rounded-full bg-blue-500"></span> 국내 기업 목록
                          </h3>
                          <button onClick={() => bulkCreateMissingAccounts('company')} disabled={loading} className="px-4 py-2 bg-blue-600 text-white rounded-lg text-xs font-bold hover:bg-blue-700 transition shadow-sm disabled:opacity-50 whitespace-nowrap">
                            {loading ? '생성 중...' : '미생성 기업 일괄 계정부여'}
                          </button>
                        </div>
                        <div className="overflow-x-auto border border-gray-200 rounded-2xl shadow-sm">
                          <table className="w-full text-sm text-left">
                            <thead className="bg-gray-50 text-gray-500 font-bold text-[11px] uppercase tracking-wider border-b border-gray-200">
                              <tr>
                                <th className="px-6 py-4 whitespace-nowrap">기업명</th>
                                <th className="px-6 py-4 whitespace-nowrap w-40">아이디 (ID 지정)</th>
                                <th className="px-6 py-4 whitespace-nowrap w-36">비밀번호 지정</th>
                                <th className="px-6 py-4 text-center whitespace-nowrap w-28">상태 및 관리</th>
                              </tr>
                            </thead>
                            <tbody className="divide-y divide-gray-100">
                              {accountList.companies.map(acc => (
                                <tr key={acc.originalId} className="hover:bg-gray-50/50 transition">
                                  <td className="px-6 py-3.5 font-bold text-gray-900 min-w-[240px] max-w-sm truncate" title={acc.displayName}>{acc.displayName}</td>
                                  <td className="px-6 py-3.5 whitespace-nowrap">
                                    {acc.isRegistered ? 
                                      <span className="text-gray-700 font-mono bg-gray-100 px-2.5 py-1 rounded border text-xs">{acc.registeredId}</span> : 
                                      <input id={`id_${acc.originalId}`} defaultValue={acc.defaultGeneratedId} className="w-36 px-2.5 py-1.5 bg-white border border-gray-300 rounded-lg text-xs focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 outline-none transition font-mono" />
                                    }
                                  </td>
                                  <td className="px-6 py-3.5 whitespace-nowrap">
                                    {acc.isRegistered ? 
                                      <span className="text-blue-600 font-bold font-mono">{acc.password}</span> : 
                                      <input id={`pw_${acc.originalId}`} defaultValue="1234" className="w-24 px-2.5 py-1.5 bg-white border border-gray-300 rounded-lg text-xs focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 outline-none transition font-mono" />
                                    }
                                  </td>
                                  <td className="px-6 py-3.5 text-center whitespace-nowrap">
                                    {acc.isRegistered ? 
                                      <span className="inline-block px-2.5 py-1 bg-green-50 text-green-600 rounded-md text-[11px] font-bold border border-green-100">생성 완료</span> : 
                                      <button onClick={() => quickCreateAccount(acc)} disabled={loading} className="px-3.5 py-1.5 bg-gray-900 text-white rounded-lg text-[11px] font-bold hover:bg-black transition shadow-sm">계정 부여</button>
                                    }
                                  </td>
                                </tr>
                              ))}
                              {accountList.companies.length === 0 && <tr><td colSpan="4" className="text-center py-10 text-gray-400 font-medium">등록된 기업 데이터가 없습니다.</td></tr>}
                            </tbody>
                          </table>
                        </div>
                      </div>
                    )}

                    {/* 해외 바이어 선택시 노출 */}
                    {accountManageType === 'buyer' && (
                      <div className="fade-in">
                        <div className="flex justify-between items-center mb-4 gap-4">
                          <h3 className="text-base font-bold text-gray-900 flex items-center gap-2 whitespace-nowrap">
                            <span className="w-2 h-2 rounded-full bg-green-500"></span> 해외 바이어 목록
                          </h3>
                          <button onClick={() => bulkCreateMissingAccounts('buyer')} disabled={loading} className="px-4 py-2 bg-blue-600 text-white rounded-lg text-xs font-bold hover:bg-blue-700 transition shadow-sm disabled:opacity-50 whitespace-nowrap">
                            {loading ? '생성 중...' : '미생성 바이어 일괄 계정부여'}
                          </button>
                        </div>
                        <div className="overflow-x-auto border border-gray-200 rounded-2xl shadow-sm">
                          <table className="w-full text-sm text-left">
                            <thead className="bg-gray-50 text-gray-500 font-bold text-[11px] uppercase tracking-wider border-b border-gray-200">
                              <tr>
                                <th className="px-6 py-4 whitespace-nowrap">바이어 기업명</th>
                                <th className="px-6 py-4 whitespace-nowrap w-40">아이디 (ID 지정)</th>
                                <th className="px-6 py-4 whitespace-nowrap w-36">비밀번호 지정</th>
                                <th className="px-6 py-4 text-center whitespace-nowrap w-28">상태 및 관리</th>
                              </tr>
                            </thead>
                            <tbody className="divide-y divide-gray-100">
                              {accountList.buyers.map(acc => (
                                <tr key={acc.originalId} className="hover:bg-gray-50/50 transition">
                                  <td className="px-6 py-3.5 font-bold text-gray-900 min-w-[240px] max-w-sm truncate" title={acc.displayName}>{acc.displayName}</td>
                                  <td className="px-6 py-3.5 whitespace-nowrap">
                                    {acc.isRegistered ? 
                                      <span className="text-gray-700 font-mono bg-gray-100 px-2.5 py-1 rounded border text-xs">{acc.registeredId}</span> : 
                                      <input id={`id_${acc.originalId}`} defaultValue={acc.defaultGeneratedId} className="w-36 px-2.5 py-1.5 bg-white border border-gray-300 rounded-lg text-xs focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 outline-none transition font-mono" />
                                    }
                                  </td>
                                  <td className="px-6 py-3.5 whitespace-nowrap">
                                    {acc.isRegistered ? 
                                      <span className="text-blue-600 font-bold font-mono">{acc.password}</span> : 
                                      <input id={`pw_${acc.originalId}`} defaultValue="1234" className="w-24 px-2.5 py-1.5 bg-white border border-gray-300 rounded-lg text-xs focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 outline-none transition font-mono" />
                                    }
                                  </td>
                                  <td className="px-6 py-3.5 text-center whitespace-nowrap">
                                    {acc.isRegistered ? 
                                      <span className="inline-block px-2.5 py-1 bg-green-50 text-green-600 rounded-md text-[11px] font-bold border border-green-100">생성 완료</span> : 
                                      <button onClick={() => quickCreateAccount(acc)} disabled={loading} className="px-3.5 py-1.5 bg-gray-900 text-white rounded-lg text-[11px] font-bold hover:bg-black transition shadow-sm">계정 부여</button>
                                    }
                                  </td>
                                </tr>
                              ))}
                              {accountList.buyers.length === 0 && <tr><td colSpan="4" className="text-center py-10 text-gray-400 font-medium">등록된 바이어 데이터가 없습니다.</td></tr>}
                            </tbody>
                          </table>
                        </div>
                      </div>
                    )}
                  </>
                ) : (
                  <div className="py-24 text-center border-2 border-dashed border-gray-200 rounded-2xl bg-gray-50/50">
                    <div className="text-4xl mb-4">🗂️</div>
                    <p className="text-gray-500 font-medium">상단에서 행사를 선택하시면 해당 행사의 일정 정보와 함께 <strong>국내기업/바이어 분리 관리 창</strong>이 나타납니다.</p>
                  </div>
                )}
              </div>
            )}
         </div>

          {/* 🌟 베이스데이터 기반 계정 생성 모달 */}
          {adminUserModal.isOpen && (
            <div className="fixed inset-0 z-[80] flex items-center justify-center p-4 bg-gray-900/40 backdrop-blur-sm fade-in">
              <form onSubmit={handleBaseAccountCreate} className="bg-white rounded-3xl p-8 w-full max-w-md shadow-2xl border border-gray-100 relative">
                <h3 className="font-bold text-xl text-gray-900 mb-6">행사 기반 계정 생성</h3>
                <div className="space-y-4 mb-8">
                  <div>
                    <label className="block text-[11px] font-bold text-gray-500 uppercase mb-2">행사 (이벤트) 선택</label>
                    <select required value={adminUserModal.selectedEvent} onChange={e=>setAdminUserModal({...adminUserModal, selectedEvent: e.target.value})} className="w-full px-4 py-3 bg-gray-50/50 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-gray-900/10 transition-all">
                      <option value="">-- 행사 선택 --</option>
                      {parsedEventsList.map(ev => <option key={ev.id} value={ev.id}>{ev.name}</option>)}
                    </select>
                  </div>
                  <div>
                    <label className="block text-[11px] font-bold text-gray-500 uppercase mb-2">계정 유형</label>
                    <select value={adminUserModal.userType} onChange={e=>setAdminUserModal({...adminUserModal, userType: e.target.value, selectedAccountId: ''})} className="w-full px-4 py-3 bg-gray-50/50 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-gray-900/10 transition-all">
                      <option value="company">국내 기업</option>
                      <option value="buyer">해외 바이어</option>
                    </select>
                  </div>
                  <div>
                    <label className="block text-[11px] font-bold text-gray-500 uppercase mb-2">대상 기업/바이어 선택</label>
                    <select required value={adminUserModal.selectedAccountId} onChange={e=>setAdminUserModal({...adminUserModal, selectedAccountId: e.target.value})} className="w-full px-4 py-3 bg-gray-50/50 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-gray-900/10 transition-all">
                      <option value="">-- 대상 선택 --</option>
                      {filteredBaseAccounts.map(acc => (
                        <option key={acc.id || acc.companyName || acc.name} value={acc.id || acc.companyName || acc.name}>
                          {acc.companyName || acc.name}
                        </option>
                      ))}
                    </select>
                    {filteredBaseAccounts.length === 0 && adminUserModal.selectedEvent && <p className="text-xs text-red-500 mt-1">등록된 {adminUserModal.userType === 'company' ? '국내 기업' : '해외 바이어'} 데이터가 없습니다.</p>}
                  </div>
                  <div>
                    <label className="block text-[11px] font-bold text-gray-500 uppercase mb-2">접속용 아이디(ID)</label>
                    <input required value={adminUserModal.userId} onChange={e=>setAdminUserModal({...adminUserModal, userId: e.target.value})} placeholder="로그인에 사용할 아이디 입력" className="w-full px-4 py-3 bg-gray-50/50 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-gray-900/10 transition-all" />
                  </div>
                  <div>
                    <label className="block text-[11px] font-bold text-gray-500 uppercase mb-2">초기 비밀번호</label>
                    <input required value={adminUserModal.password} onChange={e=>setAdminUserModal({...adminUserModal, password: e.target.value})} placeholder="비밀번호 입력" className="w-full px-4 py-3 bg-gray-50/50 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-gray-900/10 transition-all" />
                  </div>
                </div>
                <div className="flex gap-3 justify-end">
                  <button type="button" onClick={()=>setAdminUserModal({...adminUserModal, isOpen:false})} className="px-5 py-2.5 rounded-xl text-sm font-medium text-gray-500 hover:bg-gray-100 transition-colors">취소</button>
                  <button type="submit" disabled={loading || !adminUserModal.selectedAccountId} className="px-6 py-2.5 bg-indigo-600 text-white rounded-xl text-sm font-medium hover:bg-indigo-700 transition-colors">{loading ? '생성 중...' : '계정 생성 완료'}</button>
                </div>
              </form>
            </div>
          )}

          {/* 기업 상세, 미팅 신청, 승인 모달, 메시지 조회 (원본 디자인 유지) */}
          {detailModal.isOpen && detailModal.profile && (
            <div className="fixed inset-0 z-[60] flex items-center justify-center p-4 bg-gray-900/40 backdrop-blur-sm fade-in" onClick={()=>setDetailModal({isOpen:false})}>
              <div className="bg-white rounded-3xl p-8 w-full max-w-2xl shadow-2xl border border-gray-100 relative max-h-[90vh] overflow-y-auto" onClick={e=>e.stopPropagation()}>
                <button onClick={() => setDetailModal({isOpen: false, profile: null})} className="absolute top-6 right-6 p-2 text-gray-400 hover:text-gray-900 bg-gray-50 hover:bg-gray-100 rounded-full transition-colors"><svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M6 18L18 6M6 6l12 12"></path></svg></button>
                <div className="mb-8 pr-8">
                  <span className="px-2.5 py-1 bg-gray-50 text-gray-600 rounded-md text-[11px] font-bold tracking-wide uppercase border border-gray-100 inline-block mb-4">{detailModal.profile.profileData.country || 'Unknown'}</span>
                  <h3 className="font-bold text-2xl text-gray-900 mb-2">{detailModal.profile.profileData.name || 'Untitled Company'}</h3>
                  <p className="text-sm font-medium text-gray-400">{detailModal.profile.userId}</p>
                </div>
                <div className="space-y-8">
                  <div>
                    <h4 className="text-[12px] font-bold text-gray-500 uppercase tracking-wider mb-3">{t.aboutCompany}</h4>
                    <p className="text-sm text-gray-700 leading-relaxed whitespace-pre-wrap bg-gray-50/50 p-5 rounded-2xl border border-gray-100">{detailModal.profile.profileData.intro || '-'}</p>
                  </div>
                  <div className="grid grid-cols-1 sm:grid-cols-2 gap-8 pt-2">
                    <div><h4 className="text-[12px] font-bold text-gray-500 uppercase tracking-wider mb-2">{t.manager}</h4><p className="text-sm font-medium text-gray-900">{detailModal.profile.profileData.manager || '-'}</p></div>
                    <div><h4 className="text-[12px] font-bold text-gray-500 uppercase tracking-wider mb-2">{t.productsInterests}</h4><p className="text-sm font-medium text-gray-900">{detailModal.profile.profileData.products || '-'}</p></div>
                    <div className="sm:col-span-2"><h4 className="text-[12px] font-bold text-gray-500 uppercase tracking-wider mb-2">{t.websiteUrl}</h4>{detailModal.profile.profileData.website ? (<a href={detailModal.profile.profileData.website?.startsWith('http') ? detailModal.profile.profileData.website : `https://${detailModal.profile.profileData.website}`} target="_blank" className="text-sm font-semibold text-blue-600 hover:text-blue-800 hover:underline transition-colors">{detailModal.profile.profileData.website}</a>) : '-'}</div>
                  </div>
                </div>
                <div className="mt-10 pt-6 border-t border-gray-100 flex justify-end gap-3">
                  <button onClick={() => setDetailModal({isOpen: false, profile: null})} className="px-6 py-3 rounded-xl text-sm font-semibold text-gray-600 hover:bg-gray-100 transition-colors">{t.close}</button>
                  <button onClick={() => { const p = detailModal.profile; setDetailModal({isOpen: false, profile: null}); setApplyModal({ isOpen: true, targetId: p.userId, targetName: p.profileData.name || p.userId }); }} className="px-8 py-3 bg-gray-900 text-white rounded-xl text-sm font-semibold hover:bg-black hover:shadow-lg hover:-translate-y-0.5 transition-all duration-200">{t.requestMeeting}</button>
                </div>
              </div>
            </div>
          )}

          {applyModal.isOpen && (
            <div className="fixed inset-0 z-[60] flex items-center justify-center p-4 bg-gray-900/40 backdrop-blur-sm fade-in">
              <form onSubmit={handleApplyMeeting} className="bg-white rounded-3xl p-8 w-full max-w-md shadow-2xl border border-gray-100 relative">
                <h3 className="font-bold text-xl text-gray-900 mb-6">{t.requestMeeting} <br/> <span className="text-gray-400 text-sm font-medium mt-1 block">{t.with} {applyModal.targetName}</span></h3>
                <div className="mb-5"><label className="block text-[12px] font-bold text-gray-500 uppercase tracking-wider mb-2">{t.selectTime}</label>
                  <select name="time" required className="w-full px-4 py-3 bg-gray-50/50 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-gray-900/10 focus:border-gray-900 transition-all">
                    <option value="">{t.chooseSlot}</option>{eventInfo.timeSlots?.map(time => <option key={time} value={time}>{time}</option>)}
                  </select>
                </div>
                <div className="mb-8"><label className="block text-[12px] font-bold text-gray-500 uppercase tracking-wider mb-2">{t.messageOptional}</label><textarea name="message" className="w-full px-4 py-3 bg-gray-50/50 border border-gray-200 rounded-xl text-sm h-24 focus:outline-none focus:ring-2 focus:ring-gray-900/10 focus:border-gray-900 transition-all resize-none" placeholder={t.addBriefNote}></textarea></div>
                <div className="flex gap-3 justify-end"><button type="button" onClick={() => setApplyModal({isOpen:false})} className="px-5 py-2.5 rounded-xl text-sm font-medium text-gray-500 hover:bg-gray-100 transition-colors">{t.cancel}</button><button type="submit" disabled={loading} className="px-6 py-2.5 bg-gray-900 text-white rounded-xl text-sm font-medium hover:bg-black transition-colors">{loading ? t.sending : t.sendRequest}</button></div>
              </form>
            </div>
          )}

          {replyModal.isOpen && (
            <div className="fixed inset-0 z-[60] flex items-center justify-center p-4 bg-gray-900/40 backdrop-blur-sm fade-in">
              <form onSubmit={handleReplyMeeting} className="bg-white rounded-3xl p-8 w-full max-w-md shadow-2xl border border-gray-100 relative">
                <h3 className="font-bold text-xl text-gray-900 mb-2">{replyModal.type === 'approve' ? t.acceptRequest : replyModal.type === 'reschedule' ? t.reschedule : t.declineRequest}</h3>
                <p className="text-sm text-gray-500 mb-6 border-b border-gray-100 pb-6">{replyModal.type === 'approve' ? t.acceptModalDesc : replyModal.type === 'reschedule' ? t.proposeNewTime : t.declineModalDesc}</p>
                {replyModal.type === 'reschedule' && (
                  <div className="mb-8 space-y-5">
                    <div><label className="block text-[12px] font-bold text-gray-500 uppercase tracking-wider mb-2">{t.proposedTime}</label><select name="newTime" required className="w-full px-4 py-3 bg-gray-50/50 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-gray-900/10 focus:border-gray-900 transition-all"><option value="">{t.chooseSlot}</option>{eventInfo.timeSlots?.map(time => <option key={time} value={time}>{time}</option>)}</select></div>
                    <div><label className="block text-[12px] font-bold text-gray-500 uppercase tracking-wider mb-2">{t.noteToSender}</label><input type="text" name="replyMessage" required placeholder={lang === 'ko' ? "예시: 이 시간은 어떠신가요?" : "Ex: Are you available at this time?"} className="w-full px-4 py-3 bg-gray-50/50 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-gray-900/10 focus:border-gray-900 transition-all" /></div>
                  </div>
                )}
                {replyModal.type === 'reject' && (
                  <div className="mb-8"><label className="block text-[12px] font-bold text-gray-500 uppercase tracking-wider mb-2">{t.reasonOptional}</label><input type="text" name="replyMessage" placeholder={t.typeBriefReason} className="w-full px-4 py-3 bg-gray-50/50 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-gray-900/10 focus:border-gray-900 transition-all" /></div>
                )}
                <div className="flex gap-3 justify-end"><button type="button" onClick={() => setReplyModal({isOpen:false})} className="px-5 py-2.5 rounded-xl text-sm font-medium text-gray-500 hover:bg-gray-100 transition-colors">{t.cancel}</button><button type="submit" disabled={loading} className={`px-6 py-2.5 text-white rounded-xl text-sm font-medium transition-colors ${replyModal.type === 'approve' ? 'bg-blue-600 hover:bg-blue-700' : replyModal.type === 'reschedule' ? 'bg-gray-800 hover:bg-gray-900' : 'bg-red-600 hover:bg-red-700'}`}>{t.confirm}</button></div>
              </form>
            </div>
          )}

          {/* 메시지 전체 보기 모달 */}
          {msgModal.isOpen && (
            <div className="fixed inset-0 z-[70] flex items-center justify-center p-4 bg-gray-900/40 backdrop-blur-sm fade-in" onClick={() => setMsgModal({ isOpen: false, text: '' })}>
               <div className="bg-white rounded-3xl p-8 w-full max-w-md shadow-2xl border border-gray-100 relative" onClick={(e) => e.stopPropagation()}>
                <div className="flex justify-between items-center mb-4 border-b border-gray-100 pb-4">
                  <h3 className="font-bold text-lg text-gray-900">메시지 상세 내용</h3>
                  <button onClick={() => setMsgModal({ isOpen: false, text: '' })} className="text-gray-400 hover:text-gray-900 transition-colors"><svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M6 18L18 6M6 6l12 12"></path></svg></button>
                </div>
                <p className="text-sm text-gray-700 leading-relaxed whitespace-pre-wrap bg-gray-50 p-5 rounded-2xl border border-gray-100 min-h-[100px] max-h-[60vh] overflow-y-auto">{msgModal.text}</p>
                <div className="mt-6 flex justify-end"><button onClick={() => setMsgModal({ isOpen: false, text: '' })} className="px-6 py-2.5 bg-gray-900 text-white rounded-xl text-sm font-medium hover:bg-black transition-colors">닫기</button></div>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
